name: build-enterpriseg

on:
  workflow_dispatch:
    inputs:
      build_run_url:
        description: 'Link đến run build.yml đã có artifact (ví dụ: https://github.com/namnguyen97x/uup-dump-get-windows-iso/actions/runs/15830430966)'
        required: true

jobs:
  build-enterpriseg:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitHub CLI
        run: choco install gh -y

      - name: Parse run ID from input URL
        id: parse
        shell: pwsh
        run: |
          $url = "${{ github.event.inputs.build_run_url }}"
          if ($url -match "/runs/([0-9]+)") {
            echo "run_id=$($matches[1])" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "Không tìm thấy run ID trong link!"
            exit 1
          }

      - name: List artifacts from build run
        id: artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $run_id = "${{ steps.parse.outputs.run_id }}"
          $repo = "${{ github.repository }}"
          $artifactsJson = gh api "repos/$repo/actions/runs/$run_id/artifacts"
          $artifactNames = ($artifactsJson | ConvertFrom-Json).artifacts | ForEach-Object { $_.name }
          if ($artifactNames -is [string]) { $artifactNames = @($artifactNames) }
          $artifactNames | ConvertTo-Json -Compress | Set-Content artifacts.json
          echo "artifacts=$(Get-Content artifacts.json -Raw)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Download and convert all ISOs to EnterpriseG
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $artifacts = ConvertFrom-Json '${{ steps.artifacts.outputs.artifacts }}'
          foreach ($artifact in $artifacts) {
            Write-Host "[INFO] Downloading artifact: $artifact"
            gh run download ${{ steps.parse.outputs.run_id }} -n $artifact -D iso-artifacts
            Get-ChildItem -Path iso-artifacts -Filter *.zip -Recurse | ForEach-Object {
              Expand-Archive -Path $_.FullName -DestinationPath (Split-Path $_.FullName -Parent)
            }
            $iso = Get-ChildItem -Path iso-artifacts -Recurse -Filter *.iso | Select-Object -First 1
            if ($null -eq $iso) { throw "No ISO found in artifact $artifact!" }
            Write-Host "[INFO] Converting $($iso.FullName) to EnterpriseG..."
            powershell -ExecutionPolicy Bypass -File "iso-artifacts/EnterpriseG/convert-to-enterpriseg.ps1" -InputIso $iso.FullName
          }

      - name: Debug list files
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Recurse

      - name: List downloaded ISOs
        run: |
          Get-ChildItem -Path iso-artifacts -Recurse -Filter *.iso

      - name: Copy EnterpriseG tool
        run: |
          Copy-Item -Recurse EnterpriseG iso-artifacts/EnterpriseG

      - name: Upload EnterpriseG ISO
        uses: actions/upload-artifact@v4
        with:
          name: enterpriseg-iso
          path: |
            iso-artifacts/**/*.iso
            !iso-artifacts/**/*.log
            !iso-artifacts/EnterpriseG/** 