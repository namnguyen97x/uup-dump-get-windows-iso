name: build-enterpriseg

on:
  workflow_dispatch:
    inputs:
      build_run_url:
        description: 'Link đến run build.yml đã có artifact (ví dụ: https://github.com/namnguyen97x/uup-dump-get-windows-iso/actions/runs/15830430966)'
        required: true

jobs:
  build-enterpriseg:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitHub CLI
        run: choco install gh -y

      - name: Parse run ID from input URL
        id: parse
        shell: pwsh
        run: |
          $url = "${{ github.event.inputs.build_run_url }}"
          if ($url -match "/runs/([0-9]+)") {
            echo "run_id=$($matches[1])" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "Không tìm thấy run ID trong link!"
            exit 1
          }

      - name: Download windows-11-24h2 artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download ${{ steps.parse.outputs.run_id }} -n windows-11-24h2 -D iso-artifacts

      - name: Unzip artifact
        shell: pwsh
        run: |
          Get-ChildItem -Path iso-artifacts -Filter *.zip -Recurse | ForEach-Object {
            Expand-Archive -Path $_.FullName -DestinationPath (Split-Path $_.FullName -Parent)
          }

      - name: Debug list files
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Recurse

      - name: List downloaded ISOs
        run: |
          Get-ChildItem -Path iso-artifacts -Recurse -Filter *.iso

      - name: Copy EnterpriseG tool
        run: |
          Copy-Item -Recurse EnterpriseG iso-artifacts/EnterpriseG

      - name: Convert Pro ISO to EnterpriseG
        run: |
          $iso = Get-ChildItem -Path iso-artifacts -Recurse -Filter *.iso | Select-Object -First 1
          if ($null -eq $iso) { throw 'No ISO found!' }
          Write-Host "Converting $($iso.FullName) to EnterpriseG..."
          powershell -ExecutionPolicy Bypass -File "iso-artifacts/EnterpriseG/convert-to-enterpriseg.ps1" -InputIso $iso.FullName

      - name: Upload EnterpriseG ISO
        uses: actions/upload-artifact@v4
        with:
          name: enterpriseg-iso
          path: |
            iso-artifacts/**/*.iso
            !iso-artifacts/**/*.log
            !iso-artifacts/EnterpriseG/** 