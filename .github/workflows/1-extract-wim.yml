name: 1. Extract WIM from ISO

# This workflow downloads ISO artifacts from various sources
# and extracts WIM files for Enterprise G processing
# 
# Single input field accepts:
# 1. "latest" - Uses the latest successful workflow artifact
# 2. "15851372572:windows-11-23h2" - run_id:artifact_name format
# 3. "https://github.com/user/repo/actions/runs/123" - GitHub Actions run URL
# 4. "https://direct-download-url.com/file.zip" - Direct download URL
# 
# Auto-detects Windows version from artifact name (23h2, 24h2, etc.)

on:
  workflow_dispatch:
    inputs:
      source_input:
        description: 'Enter: "latest" OR run_id:artifact_name OR direct_url'
        required: true
        default: 'latest'
        type: string
  
  schedule:
    - cron: '0 2 * * 0'  # Weekly Sunday 2AM UTC

env:
  SOURCE_INPUT: ${{ github.event.inputs.source_input || 'latest' }}

jobs:
  extract-wim:
    name: Download ISO and Extract WIM
    runs-on: windows-latest
    timeout-minutes: 180
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Environment
      shell: powershell
      run: |
        Write-Host "Setting up environment..." -ForegroundColor Green
        
        # Create directories
        New-Item -ItemType Directory -Path "output" -Force | Out-Null
        New-Item -ItemType Directory -Path "temp" -Force | Out-Null
        New-Item -ItemType Directory -Path "artifacts" -Force | Out-Null
        
        # Set execution policy
        Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
        
        # Display system info
        $disk = Get-WmiObject -Class Win32_LogicalDisk -Filter "DeviceID='C:'"
        $freeGB = [math]::Round($disk.FreeSpace / 1GB, 2)
        Write-Host "Available disk space: $freeGB GB" -ForegroundColor Cyan
    
    - name: Parse Source Input
      id: parse-source
      shell: powershell
      run: |
        $sourceInput = "$env:SOURCE_INPUT".Trim()
        Write-Host "Parsing source input: $sourceInput" -ForegroundColor Green
        
        if ($sourceInput -eq "latest") {
          # Find latest successful build workflow
          Write-Host "Finding latest build workflow..." -ForegroundColor Cyan
          
          try {
            Write-Host "Searching for build.yml workflows..." -ForegroundColor Cyan
            $workflows = gh run list --workflow="build.yml" --status="success" --limit=10 --json=id,conclusion,status,displayTitle,createdAt | ConvertFrom-Json
            
            if ($workflows.Count -eq 0) {
              Write-Host "No successful 'build.yml' workflows found. Trying other workflows..." -ForegroundColor Yellow
              
              # Try to find any successful workflow with artifacts  
              Write-Host "Searching for any successful workflows with artifacts..." -ForegroundColor Cyan
              $allWorkflows = gh run list --status="success" --limit=20 --json=id,workflowName,conclusion,status,displayTitle,createdAt | ConvertFrom-Json
              Write-Host "Found $($allWorkflows.Count) successful workflows to check..." -ForegroundColor Cyan
              $workflowsWithArtifacts = @()
              
              foreach ($workflow in $allWorkflows) {
                Write-Host "Checking workflow run $($workflow.id) ($($workflow.workflowName))..." -ForegroundColor Gray
                try {
                  $artifacts = gh run view $workflow.id --json=artifacts | ConvertFrom-Json
                  if ($artifacts.artifacts -and $artifacts.artifacts.Count -gt 0) {
                    Write-Host "  Found $($artifacts.artifacts.Count) artifacts" -ForegroundColor Gray
                    $hasIsoArtifact = $artifacts.artifacts | Where-Object { 
                      $_.name -match "windows|iso|win|23h2|24h2|22h2|21h2|22631|26100|22621|22000" -or
                      ($_.sizeInBytes -and $_.sizeInBytes -gt 1GB)
                    }
                    if ($hasIsoArtifact) {
                      Write-Host "  ✅ Has suitable artifacts!" -ForegroundColor Green
                      $workflowsWithArtifacts += $workflow
                    } else {
                      Write-Host "  ❌ No suitable artifacts" -ForegroundColor Gray
                    }
                  } else {
                    Write-Host "  No artifacts" -ForegroundColor Gray
                  }
                } catch {
                  Write-Host "  Error: $_" -ForegroundColor Red
                }
              }
              
              if ($workflowsWithArtifacts.Count -eq 0) {
                throw "No workflows with Windows artifacts found"
              }
              
              $latestRun = $workflowsWithArtifacts[0]
            } else {
              $latestRun = $workflows[0]
            }
            
            Write-Host "Found latest run: $($latestRun.id) ($($latestRun.workflowName))" -ForegroundColor Green
            
            # Get artifacts from latest run
            $artifacts = gh run view $latestRun.id --json=artifacts | ConvertFrom-Json
            
            Write-Host "Available artifacts in latest run $($latestRun.id):" -ForegroundColor Cyan
            if ($artifacts.artifacts -and $artifacts.artifacts.Count -gt 0) {
              foreach ($artifact in $artifacts.artifacts) {
                $sizeMB = if ($artifact.sizeInBytes) { ($artifact.sizeInBytes / 1MB).ToString('F1') } else { "Unknown" }
                Write-Host "  - $($artifact.name) ($sizeMB MB)" -ForegroundColor White
              }
            } else {
              Write-Host "  ❌ No artifacts found in latest run" -ForegroundColor Red
              Write-Host "  💡 Trying to find other successful runs with artifacts..." -ForegroundColor Yellow
              
              # Already searched in workflowsWithArtifacts, so if we're here, there are no suitable runs
              throw "No artifacts found in any recent successful workflow runs"
            }
            
            # Try to find Windows/ISO related artifact with expanded patterns  
            $isoArtifact = $artifacts.artifacts | Where-Object { 
              $_.name -match "windows|iso|win|23h2|24h2|22h2|21h2|22631|26100|22621|22000" 
            } | Select-Object -First 1
            
            # If no Windows-specific artifact found, try any artifact that could contain an ISO
            if (-not $isoArtifact) {
              Write-Host "No Windows-specific artifact found, checking large files..." -ForegroundColor Yellow
              $isoArtifact = $artifacts.artifacts | Where-Object { 
                $_.sizeInBytes -and $_.sizeInBytes -gt 1GB  # Assume ISO files are larger than 1GB
              } | Select-Object -First 1
            }
            
            # Last resort: take the largest artifact
            if (-not $isoArtifact -and $artifacts.artifacts.Count -gt 0) {
              Write-Host "Taking largest artifact as fallback..." -ForegroundColor Yellow
              $isoArtifact = $artifacts.artifacts | Where-Object { $_.sizeInBytes } | Sort-Object sizeInBytes -Descending | Select-Object -First 1
            }
            
            if (-not $isoArtifact) {
              throw "No suitable artifacts found. Available artifacts don't match Windows/ISO patterns and aren't large enough."
            }
            
            Write-Host "✅ Selected artifact: $($isoArtifact.name)" -ForegroundColor Green
            
            echo "DOWNLOAD_METHOD=gh_cli" >> $env:GITHUB_OUTPUT
            echo "RUN_ID=$($latestRun.id)" >> $env:GITHUB_OUTPUT
            echo "ARTIFACT_NAME=$($isoArtifact.name)" >> $env:GITHUB_OUTPUT
            $currentArtifactName = $isoArtifact.name
            
          } catch {
            throw "Failed to find latest workflow: $_"
          }
          
        } elseif ($sourceInput -match "github\.com.*?/actions/runs/(\d+)") {
          # GitHub Actions run URL - Check this BEFORE generic URL pattern
          $runId = $matches[1]
          Write-Host "Extracted run ID from GitHub URL: $runId" -ForegroundColor Green
          
          try {
            # Get artifacts from the run
            Write-Host "Fetching artifacts from run $runId..." -ForegroundColor Cyan
            
            # First try without explicit repo
            try {
              $artifacts = gh run view $runId --json=artifacts | ConvertFrom-Json
              Write-Host "✅ Successfully fetched run info from current context" -ForegroundColor Green
            } catch {
              Write-Host "❌ Failed with current context, trying with explicit repo..." -ForegroundColor Yellow
              Write-Host "Error: $_" -ForegroundColor Red
              
              # Extract repo info from current context
              $currentRepoOwner = "${{ github.repository_owner }}"
              $currentRepoName = "${{ github.event.repository.name }}"
              
              Write-Host "Trying with explicit repo: $currentRepoOwner/$currentRepoName" -ForegroundColor Cyan
              $artifacts = gh run view $runId --repo "$currentRepoOwner/$currentRepoName" --json=artifacts | ConvertFrom-Json
              Write-Host "✅ Successfully fetched with explicit repo" -ForegroundColor Green
            }
            
            Write-Host "Available artifacts in run $runId`:" -ForegroundColor Cyan
            if ($artifacts.artifacts -and $artifacts.artifacts.Count -gt 0) {
              foreach ($artifact in $artifacts.artifacts) {
                $sizeMB = if ($artifact.sizeInBytes) { ($artifact.sizeInBytes / 1MB).ToString('F1') } else { "Unknown" }
                Write-Host "  - $($artifact.name) ($sizeMB MB)" -ForegroundColor White
              }
            } else {
              Write-Host "  ❌ No artifacts found in this run" -ForegroundColor Red
              Write-Host "  💡 This could mean:" -ForegroundColor Yellow
              Write-Host "     - The run hasn't completed yet" -ForegroundColor Yellow
              Write-Host "     - The run failed before creating artifacts" -ForegroundColor Yellow
              Write-Host "     - The artifacts have expired (7-90 days retention)" -ForegroundColor Yellow
              Write-Host "     - You don't have permission to access these artifacts" -ForegroundColor Yellow
              
              # Try to get a different run from the same repo
              Write-Host "🔄 Trying to find alternative runs with artifacts..." -ForegroundColor Cyan
              $repoOwner = if ($sourceInput -match "github\.com/([^/]+)/([^/]+)") { $matches[1] } else { "" }
              $repoName = if ($sourceInput -match "github\.com/([^/]+)/([^/]+)") { $matches[2] } else { "" }
              
              if ($repoOwner -and $repoName) {
                Write-Host "Searching in repo: $repoOwner/$repoName" -ForegroundColor Cyan
                $alternativeRuns = gh run list --repo "$repoOwner/$repoName" --status="success" --limit=10 --json=id,workflowName,conclusion,status,displayTitle,createdAt | ConvertFrom-Json
                
                Write-Host "Found $($alternativeRuns.Count) successful runs to check..." -ForegroundColor Cyan
                
                foreach ($altRun in $alternativeRuns) {
                  Write-Host "Checking run $($altRun.id) ($($altRun.workflowName))..." -ForegroundColor Gray
                  try {
                    $altArtifacts = gh run view $altRun.id --repo "$repoOwner/$repoName" --json=artifacts | ConvertFrom-Json
                    if ($altArtifacts.artifacts -and $altArtifacts.artifacts.Count -gt 0) {
                      Write-Host "  Found $($altArtifacts.artifacts.Count) artifacts" -ForegroundColor Gray
                      
                      foreach ($artifact in $altArtifacts.artifacts) {
                        $sizeMB = if ($artifact.sizeInBytes) { ($artifact.sizeInBytes / 1MB).ToString('F1') } else { "Unknown" }
                        Write-Host "    - $($artifact.name) ($sizeMB MB)" -ForegroundColor Gray
                      }
                      
                      $hasWindowsArtifact = $altArtifacts.artifacts | Where-Object { 
                        $_.name -match "windows|iso|win|23h2|24h2|22h2|21h2|22631|26100|22621|22000" -or
                        ($_.sizeInBytes -and $_.sizeInBytes -gt 1GB)
                      }
                      if ($hasWindowsArtifact) {
                        Write-Host "✅ Found alternative run with suitable artifacts: $($altRun.id)" -ForegroundColor Green
                        $runId = $altRun.id
                        $artifacts = $altArtifacts
                        break
                      }
                    } else {
                      Write-Host "  No artifacts in this run" -ForegroundColor Gray
                    }
                  } catch {
                    Write-Host "  Error checking run $($altRun.id): $_" -ForegroundColor Red
                  }
                }
                
                if (-not $artifacts.artifacts -or $artifacts.artifacts.Count -eq 0) {
                  throw "No runs with suitable artifacts found in repository $repoOwner/$repoName"
                }
              } else {
                throw "Cannot extract repository info from URL and no artifacts in specified run"
              }
            }
            
            # Try to find Windows/ISO related artifact with expanded patterns
            $isoArtifact = $artifacts.artifacts | Where-Object { 
              $_.name -match "windows|iso|win|23h2|24h2|22h2|21h2|22631|26100|22621|22000" 
            } | Select-Object -First 1
            
            # If no Windows-specific artifact found, try any artifact that could contain an ISO
            if (-not $isoArtifact) {
              Write-Host "No Windows-specific artifact found, checking large files..." -ForegroundColor Yellow
              $isoArtifact = $artifacts.artifacts | Where-Object { 
                $_.sizeInBytes -and $_.sizeInBytes -gt 1GB  # Assume ISO files are larger than 1GB
              } | Select-Object -First 1
            }
            
            # Last resort: take the largest artifact
            if (-not $isoArtifact -and $artifacts.artifacts.Count -gt 0) {
              Write-Host "Taking largest artifact as fallback..." -ForegroundColor Yellow
              $isoArtifact = $artifacts.artifacts | Where-Object { $_.sizeInBytes } | Sort-Object sizeInBytes -Descending | Select-Object -First 1
            }
            
            if (-not $isoArtifact) {
              throw "No suitable artifacts found. Available artifacts don't match Windows/ISO patterns and aren't large enough."
            }
            
            Write-Host "✅ Selected artifact: $($isoArtifact.name)" -ForegroundColor Green
            
            echo "DOWNLOAD_METHOD=gh_cli" >> $env:GITHUB_OUTPUT
            echo "RUN_ID=$runId" >> $env:GITHUB_OUTPUT
            echo "ARTIFACT_NAME=$($isoArtifact.name)" >> $env:GITHUB_OUTPUT
            $currentArtifactName = $isoArtifact.name
            
          } catch {
            Write-Host "❌ Error details: $_" -ForegroundColor Red
            throw "Failed to get artifacts from run $runId`: $_"
          }
          
        } elseif ($sourceInput -match "^(\d+):(.+)$") {
          # Format: run_id:artifact_name
          $runId = $matches[1]
          $artifactName = $matches[2]
          
          Write-Host "Using specified run ID: $runId, artifact: $artifactName" -ForegroundColor Green
          echo "DOWNLOAD_METHOD=gh_cli" >> $env:GITHUB_OUTPUT
          echo "RUN_ID=$runId" >> $env:GITHUB_OUTPUT
          echo "ARTIFACT_NAME=$artifactName" >> $env:GITHUB_OUTPUT
          $currentArtifactName = $artifactName
          
        } elseif ($sourceInput -match "^https?://") {
          # Direct URL (non-GitHub)
          Write-Host "Using direct URL: $sourceInput" -ForegroundColor Green
          echo "DOWNLOAD_METHOD=direct_url" >> $env:GITHUB_OUTPUT
          echo "ARTIFACT_URL=$sourceInput" >> $env:GITHUB_OUTPUT
          
          # Extract artifact name from URL for version detection
          try {
            $uri = [System.Uri]::new($sourceInput)
            $urlName = [System.IO.Path]::GetFileNameWithoutExtension($uri.Segments[-1])
            if (-not $urlName) { $urlName = "windows-iso" }
            $currentArtifactName = $urlName
            echo "ARTIFACT_NAME=$urlName" >> $env:GITHUB_OUTPUT
          } catch {
            $currentArtifactName = "windows-iso"
            echo "ARTIFACT_NAME=windows-iso" >> $env:GITHUB_OUTPUT
          }
          
        } else {
          throw "Invalid input format. Use: 'latest', 'run_id:artifact_name', 'direct_url', or GitHub Actions run URL"
        }
        
        # Auto-detect Windows version from artifact name
        Write-Host "Detecting Windows version from artifact: $currentArtifactName" -ForegroundColor Cyan
        
        $detectedBuild = ""
        if ($currentArtifactName -match "23h2|22631") { $detectedBuild = "22631" }
        elseif ($currentArtifactName -match "24h2|26100") { $detectedBuild = "26100" }
        elseif ($currentArtifactName -match "22h2|22621") { $detectedBuild = "22621" }
        elseif ($currentArtifactName -match "21h2|22000") { $detectedBuild = "22000" }
        elseif ($currentArtifactName -match "windows-11|win11") { $detectedBuild = "22631" }  # Default for Windows 11
        elseif ($currentArtifactName -match "windows-2022|win2022|server") { $detectedBuild = "20348" }  # Windows Server 2022
        
        if ($detectedBuild) {
          Write-Host "Auto-detected Windows build: $detectedBuild" -ForegroundColor Green
          echo "DETECTED_BUILD=$detectedBuild" >> $env:GITHUB_OUTPUT
        } else {
          Write-Host "Could not auto-detect Windows build from artifact name, using default" -ForegroundColor Yellow
          Write-Host "Artifact name: '$currentArtifactName'" -ForegroundColor Yellow
          echo "DETECTED_BUILD=22631" >> $env:GITHUB_OUTPUT  # Default fallback to Windows 11 23H2
        }
      env:
        GH_TOKEN: ${{ github.token }}
    
    - name: Download ISO Artifact
      shell: powershell
      run: |
        $downloadMethod = "${{ steps.parse-source.outputs.DOWNLOAD_METHOD }}"
        $artifactName = "${{ steps.parse-source.outputs.ARTIFACT_NAME }}"
        
        Write-Host "Repository: ${{ github.repository }}" -ForegroundColor Cyan
        Write-Host "Download Method: $downloadMethod" -ForegroundColor Cyan
        Write-Host "Artifact Name: $artifactName" -ForegroundColor Cyan
        
        try {
          if ($downloadMethod -eq "gh_cli") {
            # Download using GitHub CLI
            $runId = "${{ steps.parse-source.outputs.RUN_ID }}"
            
            Write-Host "Downloading artifact '$artifactName' from run $runId using GitHub CLI..." -ForegroundColor Green
            
            # Try with current repo context first
            try {
              gh run download $runId --name "$artifactName" --dir "artifacts"
              Write-Host "✅ Downloaded successfully from current repo context" -ForegroundColor Green
            } catch {
              Write-Host "❌ Failed with current context, trying with explicit repo..." -ForegroundColor Yellow
              Write-Host "Error: $_" -ForegroundColor Red
              
              # Try with explicit repo parameter
              $repoOwner = "${{ github.repository_owner }}"
              $repoName = "${{ github.event.repository.name }}"
              
              Write-Host "Trying with repo: $repoOwner/$repoName" -ForegroundColor Cyan
              gh run download $runId --repo "$repoOwner/$repoName" --name "$artifactName" --dir "artifacts"
              Write-Host "✅ Downloaded successfully with explicit repo" -ForegroundColor Green
            }
            
          } elseif ($downloadMethod -eq "direct_url") {
            # Download using direct URL
            $artifactUrl = "${{ steps.parse-source.outputs.ARTIFACT_URL }}"
            
            Write-Host "Downloading artifact from URL: $artifactUrl" -ForegroundColor Green
            
            # Create temp filename
            $fileName = if ($artifactUrl -match "\.zip$") { "artifact.zip" } else { "artifact.bin" }
            $tempFile = Join-Path "artifacts" $fileName
            
            # Download using PowerShell
            Invoke-WebRequest -Uri $artifactUrl -OutFile $tempFile -Headers @{"User-Agent"="GitHub-Actions"}
            
            # If it's a zip file, extract it
            if ($fileName -eq "artifact.zip") {
              Expand-Archive -Path $tempFile -DestinationPath "artifacts" -Force
              Remove-Item $tempFile -Force
            }
            
          } else {
            throw "Unknown download method: $downloadMethod"
          }
          
          # Find ISO file in downloaded artifact
          $isoFile = Get-ChildItem -Path "artifacts" -Filter "*.iso" -Recurse | Select-Object -First 1
          
          if ($isoFile) {
            # Move ISO to output directory
            $outputIso = Join-Path "output" $isoFile.Name
            Move-Item -Path $isoFile.FullName -Destination $outputIso -Force
            
            Write-Host "Downloaded ISO: $($isoFile.Name)" -ForegroundColor Green
            Write-Host "ISO Size: $([math]::Round((Get-Item $outputIso).Length / 1GB, 2)) GB" -ForegroundColor Cyan
          } else {
            throw "No ISO file found in artifact"
          }
          
        } catch {
          Write-Host "Download failed: $_" -ForegroundColor Red
          Write-Host "Download Method: $downloadMethod" -ForegroundColor Yellow
          if ($downloadMethod -eq "direct_url") {
            Write-Host "Artifact URL: ${{ steps.parse-source.outputs.ARTIFACT_URL }}" -ForegroundColor Yellow
          }
          exit 1
        }
      env:
        GH_TOKEN: ${{ github.token }}
    
    - name: Extract WIM from ISO
      shell: powershell
      run: |
        Write-Host "Extracting WIM file from ISO..." -ForegroundColor Green
        
        $isoFile = Get-ChildItem -Path "output" -Filter "*.iso" | Select-Object -First 1
        if (-not $isoFile) {
          throw "No ISO file found"
        }
        
        # Mount ISO
        Write-Host "Mounting ISO: $($isoFile.Name)" -ForegroundColor Cyan
        $mountResult = Mount-DiskImage -ImagePath $isoFile.FullName -PassThru
        
        try {
          $volume = $mountResult | Get-Volume
          $installWim = Join-Path $volume.DriveLetter ":\sources\install.wim"
          
          if (-not (Test-Path $installWim)) {
            throw "install.wim not found in ISO"
          }
          
          # Copy WIM file
          $wimDestination = Join-Path "output" "install.wim"
          Write-Host "Copying install.wim..." -ForegroundColor Cyan
          Copy-Item -Path $installWim -Destination $wimDestination -Force
          
          # Get WIM info
          $wimInfo = Get-WindowsImage -ImagePath $wimDestination -Index 1
          Write-Host "WIM Version: $($wimInfo.Version)" -ForegroundColor Green
          Write-Host "WIM Size: $([math]::Round((Get-Item $wimDestination).Length / 1GB, 2)) GB" -ForegroundColor Cyan
          
          # Find Pro edition index
          $allImages = Get-WindowsImage -ImagePath $wimDestination
          $proIndex = $allImages | Where-Object { $_.ImageName -match "Pro(fessional)?" } | Select-Object -ExpandProperty ImageIndex -First 1
          
          if ($proIndex) {
            Write-Host "Found Pro edition at index: $proIndex" -ForegroundColor Green
            echo "PRO_INDEX=$proIndex" >> $env:GITHUB_OUTPUT
            # Also set as environment variable for build info step
            echo "PRO_INDEX=$proIndex" >> $env:GITHUB_ENV
          } else {
            throw "Pro edition not found in WIM"
          }
          
        } finally {
          # Unmount ISO
          Write-Host "Dismounting ISO..." -ForegroundColor Cyan
          Dismount-DiskImage -ImagePath $isoFile.FullName | Out-Null
        }
        
        # Remove ISO to save space
        Remove-Item -Path $isoFile.FullName -Force
        Write-Host "Removed ISO file to save space" -ForegroundColor Yellow
    
    - name: Create Build Info
      shell: powershell
      run: |
        $detectedBuild = "${{ steps.parse-source.outputs.DETECTED_BUILD }}"
        
        $buildInfo = @{
          BuildDate = Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC"
          WindowsBuild = $detectedBuild
          ProIndex = "$env:PRO_INDEX"
          SourceInput = "$env:SOURCE_INPUT"
          SourceRunId = "${{ steps.parse-source.outputs.RUN_ID }}"
          SourceArtifact = "${{ steps.parse-source.outputs.ARTIFACT_NAME }}"
          DownloadMethod = "${{ steps.parse-source.outputs.DOWNLOAD_METHOD }}"
          WorkflowRun = "${{ github.run_number }}"
          CommitSha = "${{ github.sha }}"
        }
        
        $buildInfo | ConvertTo-Json | Set-Content "output/build-info.json" -Encoding UTF8
        Write-Host "Build info created for Windows build: $detectedBuild" -ForegroundColor Green
        
        # Set for next steps
        echo "FINAL_BUILD=$detectedBuild" >> $env:GITHUB_OUTPUT
      id: build-info
    
    - name: Upload WIM Artifact
      uses: actions/upload-artifact@v4
      with:
        name: wim-build-${{ steps.build-info.outputs.FINAL_BUILD }}-${{ github.run_number }}
        path: |
          output/install.wim
          output/build-info.json
        retention-days: 7
        compression-level: 6
    
    - name: Cleanup
      if: always()
      shell: powershell
      run: |
        Write-Host "Cleaning up..." -ForegroundColor Green
        
        # Remove large files and temp directories
        Get-ChildItem -Path "output" -Filter "*.iso" | Remove-Item -Force -ErrorAction SilentlyContinue
        Get-ChildItem -Path "temp" -Recurse | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
        Get-ChildItem -Path "artifacts" -Recurse | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
        
        Write-Host "Cleanup completed" -ForegroundColor Green 