name: 🪟 Windows ISO Debloater

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Workflow URL hoặc link tải trực tiếp ISO (tự động nhận diện)'
        required: true
        type: string
        default: 'https://github.com/namnguyen97x/uup-dump-get-windows-iso/actions/runs/15851372572'

jobs:
  debloat:
    runs-on: windows-latest
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      
    - name: 🔍 Display system info
      run: |
        Write-Host "=== SYSTEM INFORMATION ==="
        Write-Host "OS: $(Get-ComputerInfo | Select-Object -ExpandProperty WindowsProductName)"
        Write-Host "PowerShell: $($PSVersionTable.PSVersion)"
        Write-Host "Available disk space: $([math]::Round((Get-WmiObject -Class Win32_LogicalDisk -Filter "DeviceID='C:'").FreeSpace / 1GB, 2)) GB"
        Write-Host "Execution Policy: $(Get-ExecutionPolicy)"
        
        Write-Host "=== INPUT ==="
        Write-Host "Source: ${{ github.event.inputs.source }}"
      
    - name: 📥 Download ISO or Artifact (auto-detect)
      id: download_iso
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $source = "${{ github.event.inputs.source }}"
        $token = "$env:GITHUB_TOKEN"
        
        Write-Host "=== AUTO-DETECTING SOURCE TYPE ==="
        Write-Host "Source: $source"
        
        if ($source -match "github.com/.*/actions/runs/(\d+)") {
            # GitHub Actions workflow URL
            if ($source -match "github.com/([^/]+/[^/]+)/actions/runs/(\d+)") {
                $repo = $matches[1]
                $runId = $matches[2]
                Write-Host "✅ Detected GitHub workflow: $repo, run $runId"
                
                $artifactsUrl = "https://api.github.com/repos/$repo/actions/runs/$runId/artifacts"
                $headers = @{ 
                    Authorization = "Bearer $token"
                    "X-GitHub-Api-Version" = "2022-11-28"
                    "User-Agent" = "GitHub-Actions-Workflow"
                }
                
                Write-Host "🔍 Fetching artifacts from: $artifactsUrl"
                
                try {
                    $artifacts = Invoke-RestMethod -Uri $artifactsUrl -Headers $headers
                    Write-Host "Found $($artifacts.total_count) artifacts"
                    
                    # Find Windows ISO artifact
                    $artifact = $artifacts.artifacts | Where-Object { 
                        $_.name -match "windows|iso" -or $_.size_in_bytes -gt 3GB 
                    } | Sort-Object size_in_bytes -Descending | Select-Object -First 1
                    
                    if (-not $artifact) {
                        $artifact = $artifacts.artifacts | Sort-Object size_in_bytes -Descending | Select-Object -First 1
                    }
                    
                    if (-not $artifact) { 
                        throw "No suitable artifacts found in workflow"
                    }
                    
                    Write-Host "📦 Selected artifact: $($artifact.name) ($([math]::Round($artifact.size_in_bytes / 1GB, 2)) GB)"
                    
                    # Download artifact
                    Write-Host "⬇️ Downloading artifact..."
                    $webClient = New-Object System.Net.WebClient
                    $webClient.Headers.Add("Authorization", "Bearer $token")
                    $webClient.Headers.Add("User-Agent", "GitHub-Actions-Workflow")
                    $webClient.DownloadFile($artifact.archive_download_url, "artifact.zip")
                    
                    Write-Host "📂 Extracting artifact..."
                    Expand-Archive artifact.zip -DestinationPath artifact -Force
                    
                    # Find ISO in artifact
                    $iso = Get-ChildItem artifact -Recurse -Filter *.iso | Select-Object -First 1
                    if (-not $iso) {
                        throw "No ISO file found in artifact"
                    }
                    
                    Copy-Item $iso.FullName windows.iso -Force
                    Write-Host "✅ ISO extracted: $($iso.Name)"
                    
                    # Cleanup
                    Remove-Item artifact.zip -Force -ErrorAction SilentlyContinue
                    Remove-Item artifact -Recurse -Force -ErrorAction SilentlyContinue
                    
                } catch {
                    Write-Host "❌ Failed to download from workflow: $($_.Exception.Message)" -ForegroundColor Red
                    throw
                }
            } else {
                throw "Invalid GitHub workflow URL format"
            }
        } else {
            # Direct download URL
            Write-Host "✅ Detected direct download URL"
            Write-Host "⬇️ Downloading ISO directly..."
            
            try {
                $webClient = New-Object System.Net.WebClient
                $webClient.DownloadFile($source, "windows.iso")
                Write-Host "✅ Direct download completed"
            } catch {
                Write-Host "❌ Direct download failed, trying Invoke-WebRequest..." -ForegroundColor Yellow
                Invoke-WebRequest -Uri $source -OutFile "windows.iso" -UseBasicParsing
                Write-Host "✅ Fallback download completed"
            }
        }
        
        # Verify ISO
        if (Test-Path "windows.iso") {
            $fileSize = (Get-Item "windows.iso").Length / 1GB
            Write-Host "🎯 ISO ready: $([math]::Round($fileSize,2)) GB"
            
            if ($fileSize -lt 3) {
                Write-Host "⚠️ Warning: ISO size seems small, might not be a complete Windows ISO" -ForegroundColor Yellow
            }
        } else {
            throw "ISO download failed - file not found"
        }

    - name: 🧹 Run Robust Debloat (with defaults)
      run: |
        Write-Host "=== STARTING ROBUST DEBLOAT WITH DEFAULTS ==="
        Write-Host "✅ Remove Edge: Enabled (default)"
        Write-Host "✅ Remove OneDrive: Enabled (default)" 
        Write-Host "✅ Hardware Bypass: Enabled (default)"
        Write-Host "✅ Privacy Tweaks: Enabled (default)"
        Write-Host "✅ Enhanced Error Handling: Enabled"
        Write-Host "✅ Comprehensive Logging: Enabled"
        
        # Check if required debloat scripts exist
        $requiredScripts = @("scripts/robust-debloat.ps1", "scripts/fallback-debloat.ps1")
        foreach ($script in $requiredScripts) {
            if (-not (Test-Path $script)) {
                Write-Host "❌ Required script not found: $script" -ForegroundColor Red
                Write-Host "Available scripts:"
                Get-ChildItem scripts -Filter "*.ps1" | ForEach-Object { Write-Host "  $($_.Name)" }
                exit 1
            }
        }
        Write-Host "✅ All required scripts found"
        
        # Run with all debloat options enabled by default
        $scriptParams = @{
            isoPath = "windows.iso"
            outputISO = "debloated-windows.iso"
            removeEdge = $true
            removeOneDrive = $true
            tpmBypass = $true
            testMode = $false
        }
        
        Write-Host "=== EXECUTING ROBUST DEBLOAT SCRIPT ==="
        Write-Host "Script: scripts/robust-debloat.ps1"
        Write-Host "Parameters: $($scriptParams | ConvertTo-Json -Compress)"
        
        try {
            Write-Host "Starting debloat process with 15-minute timeout..."
            
            # Start the robust debloat script as a job with timeout
            $job = Start-Job -ScriptBlock {
                param($scriptPath, $params)
                & $scriptPath @params
            } -ArgumentList "scripts/robust-debloat.ps1", $scriptParams
            
            # Wait for job with timeout (15 minutes)
            $timeout = 900 # 15 minutes in seconds
            $completed = Wait-Job $job -Timeout $timeout
            
            if ($completed) {
                # Job completed within timeout
                $output = Receive-Job $job
                $output | ForEach-Object { Write-Host $_ }
                
                $exitCode = if ($job.State -eq "Completed") { 0 } else { 1 }
                Write-Host "Script exit code: $exitCode"
                
                if ($exitCode -ne 0) {
                    Write-Host "⚠️ Robust script had issues, trying fallback method..." -ForegroundColor Yellow
                    
                    # Run fallback script
                    Write-Host "=== EXECUTING FALLBACK DEBLOAT SCRIPT ==="
                    & "scripts/fallback-debloat.ps1" @scriptParams
                    $fallbackExitCode = $LASTEXITCODE
                    
                    if ($fallbackExitCode -ne 0) {
                        throw "Both robust and fallback scripts failed"
                    }
                    
                    Write-Host "✅ Fallback debloat completed successfully!"
                } else {
                    Write-Host "✅ Robust debloat completed successfully!"
                }
            } else {
                # Job timed out or is stuck
                Write-Host "⚠️ Robust script timeout/stuck - killing and using fallback..." -ForegroundColor Yellow
                
                # Stop the job
                Stop-Job $job
                Remove-Job $job -Force
                
                # Kill any stuck DISM processes
                Get-Process -Name "dism" -ErrorAction SilentlyContinue | Stop-Process -Force
                
                # Clean up any stuck mounts
                & dism /cleanup-wim 2>$null
                & dism /cleanup-mountpoints 2>$null
                
                Write-Host "=== EXECUTING FALLBACK DEBLOAT SCRIPT ==="
                & "scripts/fallback-debloat.ps1" @scriptParams
                $fallbackExitCode = $LASTEXITCODE
                
                if ($fallbackExitCode -ne 0) {
                    throw "Fallback script also failed"
                }
                
                Write-Host "✅ Fallback debloat completed successfully!"
            }
            
            Remove-Job $job -Force -ErrorAction SilentlyContinue
            
        } catch {
            Write-Host "❌ Error during debloat: $($_.Exception.Message)" -ForegroundColor Red
            
            # Final cleanup
            Get-Process -Name "dism" -ErrorAction SilentlyContinue | Stop-Process -Force
            & dism /cleanup-wim 2>$null
            & dism /cleanup-mountpoints 2>$null
            
            throw
        }
      
    - name: 📊 Show Results
      run: |
        Write-Host "=== DEBLOAT RESULTS ==="
        
        if (Test-Path "debloated-windows.iso") {
            $originalISO = Get-Item "windows.iso"
            $debloatedISO = Get-Item "debloated-windows.iso"
            
            $originalSize = $originalISO.Length / 1GB
            $debloatedSize = $debloatedISO.Length / 1GB
            $savedSpace = $originalSize - $debloatedSize
            $percentage = ($savedSpace / $originalSize) * 100
            
            Write-Host "🎯 Debloated ISO created successfully!"
            Write-Host "📊 Original size: $([math]::Round($originalSize, 2)) GB"
            Write-Host "📊 Debloated size: $([math]::Round($debloatedSize, 2)) GB"
            Write-Host "💾 Space saved: $([math]::Round($savedSpace, 2)) GB ($([math]::Round($percentage, 1))%)"
            
            # Create summary
            echo "## 🎯 Windows ISO Debloated Successfully ✅" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "### 📊 Size Comparison" >> $env:GITHUB_STEP_SUMMARY  
            echo "- **Original ISO**: $([math]::Round($originalSize, 2)) GB" >> $env:GITHUB_STEP_SUMMARY
            echo "- **Debloated ISO**: $([math]::Round($debloatedSize, 2)) GB" >> $env:GITHUB_STEP_SUMMARY
            echo "- **Space Saved**: $([math]::Round($savedSpace, 2)) GB ($([math]::Round($percentage, 1))%)" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "### 🗑️ Components Removed (Aggressive Debloating)" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Single Windows edition** exported with maximum compression" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Microsoft Store bloatware apps** (Candy Crush, TikTok, etc.)" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Microsoft Edge browser** completely removed" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **OneDrive integration** fully stripped" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Windows capabilities** (WordPad, Media Player, etc.)" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Bloatware directories** (sxs, inf, background, recovery)" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Language packs** (kept en-US only)" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Setup and servicing files** (setupprep, oobe, etc.)" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Event logs and diagnostics** removed" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Privacy-invasive telemetry** components" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Windows 11 TPM/SecureBoot** checks bypassed" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "### 🚀 What's Preserved" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **setup.exe** - Installation capability maintained" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **boot.wim** - Boot functionality preserved" >> $env:GITHUB_STEP_SUMMARY  
            echo "- ✅ **Boot files** - System can start properly" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Core Windows** - All essential components intact" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "### 🔧 Aggressive Debloating Features" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Single edition export** - removes all other Windows editions" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Maximum WIM compression** - significantly reduces file size" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Bloatware directory removal** - removes non-essential components" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Enhanced error handling** with multiple fallback mechanisms" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Size-aware ISO creation** - handles large files properly" >> $env:GITHUB_STEP_SUMMARY  
            echo "- ✅ **Comprehensive logging** for troubleshooting" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Multiple mount strategies** for better compatibility" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Graceful degradation** when some operations fail" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "📥 **Download the debloated ISO from artifacts below**" >> $env:GITHUB_STEP_SUMMARY
            
        } else {
            Write-Host "❌ No debloated ISO was created" -ForegroundColor Red
            
            echo "## ❌ Debloat Process Failed" >> $env:GITHUB_STEP_SUMMARY
            echo "The debloat script completed but no ISO was generated." >> $env:GITHUB_STEP_SUMMARY
            echo "Check the logs above for detailed error information." >> $env:GITHUB_STEP_SUMMARY
        }
      
    - name: 📤 Upload Debloated ISO
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: debloated-windows-iso
        path: debloated-windows.iso
        retention-days: 7
        compression-level: 0 