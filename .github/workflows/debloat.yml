name: 🪟 Windows ISO Debloater

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (validate only, no ISO creation)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      win_edition:
        description: 'Windows Edition (Pro, Home, Enterprise, etc.)'
        required: false
        default: 'Pro'
        type: string
      remove_edge:
        description: 'Remove Microsoft Edge'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      remove_onedrive:
        description: 'Remove OneDrive'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      tpm_bypass:
        description: 'Enable Windows 11 TPM/SecureBoot bypass'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  debloat:
    runs-on: windows-latest
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      
    - name: 🔍 Display system info
      run: |
        Write-Host "=== SYSTEM INFORMATION ==="
        Write-Host "OS: $(Get-ComputerInfo | Select-Object -ExpandProperty WindowsProductName)"
        Write-Host "PowerShell: $($PSVersionTable.PSVersion)"
        Write-Host "Available disk space: $([math]::Round((Get-WmiObject -Class Win32_LogicalDisk -Filter "DeviceID='C:'").FreeSpace / 1GB, 2)) GB"
        Write-Host "Execution Policy: $(Get-ExecutionPolicy)"
        
        Write-Host "=== WORKFLOW INPUTS ==="
        Write-Host "Test Mode: ${{ github.event.inputs.test_mode }}"
        Write-Host "Windows Edition: ${{ github.event.inputs.win_edition }}"
        Write-Host "Remove Edge: ${{ github.event.inputs.remove_edge }}"
        Write-Host "Remove OneDrive: ${{ github.event.inputs.remove_onedrive }}"
        Write-Host "TPM Bypass: ${{ github.event.inputs.tmp_bypass }}"
      
    - name: 📥 Download Windows ISO
      run: |
        Write-Host "=== DOWNLOADING WINDOWS ISO ==="
        
        # Download Windows 11 ISO (example URL - replace with actual)
        $isoUrl = "https://archive.org/download/windows-11-consumer-editions-version-23h2-x64-dvd/en-us_windows_11_consumer_editions_version_23h2_x64_dvd_ce15dcf8.iso"
        $isoPath = "windows.iso"
        
        Write-Host "Downloading from: $isoUrl"
        Write-Host "Saving to: $isoPath"
        
        try {
            # Use WebClient for better progress tracking
            $webClient = New-Object System.Net.WebClient
            $webClient.DownloadFile($isoUrl, $isoPath)
            
            if (Test-Path $isoPath) {
                $isoSize = (Get-Item $isoPath).Length / 1GB
                Write-Host "✅ Download completed successfully"
                Write-Host "ISO size: $([math]::Round($isoSize, 2)) GB"
            } else {
                throw "ISO file not found after download"
            }
        } catch {
            Write-Host "❌ Download failed: $($_.Exception.Message)" -ForegroundColor Red
            
            # Fallback: Try with Invoke-WebRequest
            Write-Host "Trying alternative download method..."
            Invoke-WebRequest -Uri $isoUrl -OutFile $isoPath -UseBasicParsing
            
            if (Test-Path $isoPath) {
                $isoSize = (Get-Item $isoPath).Length / 1GB
                Write-Host "✅ Fallback download successful"
                Write-Host "ISO size: $([math]::Round($isoSize, 2)) GB"
            } else {
                Write-Host "❌ All download methods failed" -ForegroundColor Red
                exit 1
            }
        }
      
    - name: 🧹 Run Windows ISO Debloater
      run: |
        Write-Host "=== STARTING PROPER DEBLOAT PROCESS ==="
        
        # Parse input parameters
        $testMode = "${{ github.event.inputs.test_mode }}" -eq "true"
        $winEdition = "${{ github.event.inputs.win_edition }}"
        $removeEdge = "${{ github.event.inputs.remove_edge }}" -ne "false"
        $removeOneDrive = "${{ github.event.inputs.remove_onedrive }}" -ne "false"
        $tmpBypass = "${{ github.event.inputs.tpm_bypass }}" -eq "true"
        
        Write-Host "Parsed parameters:"
        Write-Host "  Test Mode: $testMode"
        Write-Host "  Windows Edition: $winEdition"
        Write-Host "  Remove Edge: $removeEdge"
        Write-Host "  Remove OneDrive: $removeOneDrive"
        Write-Host "  TPM Bypass: $tmpBypass"
        
        # Build parameters for script
        $scriptParams = @{
            isoPath = "windows.iso"
            outputISO = "debloated-windows.iso"
            testMode = $testMode
        }
        
        if ($winEdition) {
            $scriptParams.winEdition = $winEdition
        }
        
        if (-not $removeEdge) {
            $scriptParams.removeEdge = $false
        }
        
        if (-not $removeOneDrive) {
            $scriptParams.removeOneDrive = $false
        }
        
        if ($tmpBypass) {
            $scriptParams.tmpBypass = $true
        }
        
        Write-Host "=== EXECUTING DEBLOAT SCRIPT ==="
        Write-Host "Script: scripts/proper-debloat.ps1"
        Write-Host "Parameters: $($scriptParams | ConvertTo-Json -Compress)"
        
        try {
            # Execute the proper debloat script
            & "scripts/proper-debloat.ps1" @scriptParams
            
            $exitCode = $LASTEXITCODE
            Write-Host "Script exit code: $exitCode"
            
            if ($exitCode -ne 0) {
                throw "Debloat script failed with exit code $exitCode"
            }
            
            Write-Host "✅ Debloat process completed successfully!"
            
        } catch {
            Write-Host "❌ Error during debloat process: $($_.Exception.Message)" -ForegroundColor Red
            throw
        }
      
    - name: 📊 Display Results
      run: |
        $testMode = "${{ github.event.inputs.test_mode }}" -eq "true"
        $isoCreated = Test-Path "debloated-windows.iso"
        
        Write-Host "=== DEBLOAT RESULTS ==="
        
        if ($testMode) {
            Write-Host "✅ Test Mode: Validation completed successfully"
            Write-Host "   - ISO structure is valid"
            Write-Host "   - Windows editions detected"
            Write-Host "   - Ready for actual debloating"
            
            echo "## 🧪 Test Completed Successfully ✅" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "- ISO structure is valid and ready for debloating" >> $env:GITHUB_STEP_SUMMARY
            echo "- Windows editions detected and analyzed" >> $env:GITHUB_STEP_SUMMARY
            echo "- All components verified successfully" >> $env:GITHUB_STEP_SUMMARY
            
        } elseif ($isoCreated) {
            $originalISO = Get-Item "windows.iso"
            $debloatedISO = Get-Item "debloated-windows.iso"
            
            $originalSize = $originalISO.Length / 1GB
            $debloatedSize = $debloatedISO.Length / 1GB
            $savedSpace = $originalSize - $debloatedSize
            $percentage = ($savedSpace / $originalSize) * 100
            
            Write-Host "✅ Debloated ISO created successfully!"
            Write-Host "   Original size: $([math]::Round($originalSize, 2)) GB"
            Write-Host "   Debloated size: $([math]::Round($debloatedSize, 2)) GB"
            Write-Host "   Space saved: $([math]::Round($savedSpace, 2)) GB ($([math]::Round($percentage, 1))%)"
            
            echo "## 🎯 Debloat Completed Successfully ✅" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "### 📊 Size Comparison" >> $env:GITHUB_STEP_SUMMARY
            echo "- **Original ISO**: $([math]::Round($originalSize, 2)) GB" >> $env:GITHUB_STEP_SUMMARY
            echo "- **Debloated ISO**: $([math]::Round($debloatedSize, 2)) GB" >> $env:GITHUB_STEP_SUMMARY
            echo "- **Space Saved**: $([math]::Round($savedSpace, 2)) GB ($([math]::Round($percentage, 1))%)" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "### 🗑️ Components Removed" >> $env:GITHUB_STEP_SUMMARY
            echo "- Microsoft Store bloatware apps" >> $env:GITHUB_STEP_SUMMARY
            echo "- Unnecessary Windows capabilities" >> $env:GITHUB_STEP_SUMMARY
            echo "- Privacy-invasive telemetry components" >> $env:GITHUB_STEP_SUMMARY
            if ("${{ github.event.inputs.remove_edge }}" -ne "false") {
                echo "- Microsoft Edge browser" >> $env:GITHUB_STEP_SUMMARY
            }
            if ("${{ github.event.inputs.remove_onedrive }}" -ne "false") {
                echo "- OneDrive integration" >> $env:GITHUB_STEP_SUMMARY  
            }
            if ("${{ github.event.inputs.tmp_bypass }}" -eq "true") {
                echo "- Windows 11 TPM/SecureBoot checks bypassed" >> $env:GITHUB_STEP_SUMMARY
            }
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "📥 **Download the debloated ISO from the artifacts below**" >> $env:GITHUB_STEP_SUMMARY
            
        } else {
            Write-Host "⚠️ Process completed but no ISO was created"
            Write-Host "   This might happen in test mode or if there was an error"
            
            echo "## ⚠️ Process Completed" >> $env:GITHUB_STEP_SUMMARY
            echo "Script executed but no debloated ISO was created." >> $env:GITHUB_STEP_SUMMARY
            echo "This typically happens in test mode or due to configuration issues." >> $env:GITHUB_STEP_SUMMARY
        }
      
    - name: 📤 Upload Debloated ISO
      if: success() && github.event.inputs.test_mode != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: debloated-windows-iso
        path: debloated-windows.iso
        retention-days: 7
        compression-level: 0  # ISO is already compressed 