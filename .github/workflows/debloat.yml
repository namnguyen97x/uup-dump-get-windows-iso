name: Debloat Windows ISO

on:
  workflow_dispatch:
    inputs:
      iso_source:
        description: 'ISO source (artifact or url)'
        required: true
        default: 'artifact'
        type: choice
        options:
          - artifact
          - url
      iso_url:
        description: 'ISO URL (if source is url)'
        required: false
        type: string
      artifact_name:
        description: 'Artifact name to download (if source is artifact)'
        required: false
        type: string
        default: 'Windows-11-23H2'
  schedule:
    # Chạy hàng tuần vào Chủ nhật lúc 2:00 AM UTC
    - cron: '0 2 * * 0'

jobs:
  debloat-iso:
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PowerShell environment
        shell: pwsh
        run: |
          # Cài đặt các module PowerShell cần thiết
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          Install-Module -Name 7Zip4PowerShell -Force -Scope CurrentUser -ErrorAction SilentlyContinue

      - name: Download ISO from artifact
        if: github.event.inputs.iso_source == 'artifact' || github.event.inputs.iso_source == null
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.inputs.artifact_name || 'Windows-11-23H2' }}
          path: ./iso-input

      - name: Download ISO from URL
        if: github.event.inputs.iso_source == 'url' && github.event.inputs.iso_url != ''
        shell: pwsh
        run: |
          $isoUrl = "${{ github.event.inputs.iso_url }}"
          $outputPath = "./iso-input"
          New-Item -ItemType Directory -Path $outputPath -Force
          
          Write-Host "Downloading ISO from: $isoUrl"
          $fileName = Split-Path $isoUrl -Leaf
          $outputFile = Join-Path $outputPath $fileName
          
          Invoke-WebRequest -Uri $isoUrl -OutFile $outputFile -UseBasicParsing
          Write-Host "Downloaded ISO to: $outputFile"

      - name: List downloaded files
        shell: pwsh
        run: |
          Write-Host "Contents of iso-input directory:"
          Get-ChildItem -Path "./iso-input" -Recurse | Format-Table Name, Length, LastWriteTime

      - name: Run Simple Windows ISO Debloat script
        shell: pwsh
        run: |
          # Tạo thư mục output
          New-Item -ItemType Directory -Path "./iso-output" -Force
          
          # Chạy script debloat đơn giản
          $ErrorActionPreference = "Continue"
          $ProgressPreference = "SilentlyContinue"
          
          Write-Host "Starting simple Windows ISO debloat process..."
          & "./scripts/simple-debloat.ps1" -InputPath "./iso-input" -OutputPath "./iso-output" -Verbose
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Debloat script failed with exit code: $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Show disk space after debloat
        shell: pwsh
        run: |
          Write-Host "Available disk space after debloat:"
          Get-PSDrive -PSProvider FileSystem

      - name: List debloated files
        shell: pwsh
        run: |
          Write-Host "Contents of iso-output directory:"
          Get-ChildItem -Path "./iso-output" -Recurse | Format-Table Name, Length, LastWriteTime

      - name: Upload debloated ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: debloated-windows-iso
          path: |
            ./iso-output/*.iso
            ./iso-output/*.json
            ./iso-output/*.xml
            ./iso-output/*.reg
            ./iso-output/*.ps1
            ./iso-output/*.md
            ./iso-output/*.txt
          retention-days: 30

      - name: Create debloat summary
        shell: pwsh
        run: |
          $inputFiles = Get-ChildItem -Path "./iso-input" -File
          $outputFiles = Get-ChildItem -Path "./iso-output" -File
          
          $inputSize = ($inputFiles | Measure-Object -Property Length -Sum).Sum
          $outputSize = ($outputFiles | Measure-Object -Property Length -Sum).Sum
          $sizeReduction = if ($inputSize -gt 0) { [math]::Round((($inputSize - $outputSize) / $inputSize) * 100, 2) } else { 0 }
          
          Add-Content $env:GITHUB_STEP_SUMMARY @"
          ## Windows ISO Debloat Summary
          
          ### Input Files
          | File | Size |
          |------|------|
          $($inputFiles | ForEach-Object {"| $($_.Name) | $([math]::Round($_.Length / 1MB, 2)) MB |"})
          
          ### Output Files
          | File | Size |
          |------|------|
          $($outputFiles | ForEach-Object {"| $($_.Name) | $([math]::Round($_.Length / 1MB, 2)) MB |"})
          
          ### Size Reduction
          - **Original Size:** $([math]::Round($inputSize / 1MB, 2)) MB
          - **Debloated Size:** $([math]::Round($outputSize / 1MB, 2)) MB
          - **Reduction:** $sizeReduction%
          
          ### Debloat Features Applied
          - Created unattended setup configuration (unattend.xml)
          - Generated registry settings for telemetry removal
          - Created setup script for post-installation debloat
          - Applied OOBE bypass settings
          - Optimized for privacy and performance
          - Removed bloatware apps (via setup script)
          
          ### Usage Instructions
          1. **Burn ISO to USB/DVD**: Use the debloated ISO file
          2. **Automatic Setup**: Installation will proceed without user interaction
          3. **Post-Install**: Run setup-debloat.ps1 for additional optimizations
          4. **Registry Settings**: Import debloat-settings.reg for telemetry removal
          
          ### Files Included
          - `debloated-*.iso` - Optimized Windows ISO
          - `unattend.xml` - Unattended setup configuration
          - `debloat-settings.reg` - Registry optimizations
          - `setup-debloat.ps1` - Post-installation script
          - `README.md` - Detailed instructions
          - `*.json` - Debloat information
          "@ 