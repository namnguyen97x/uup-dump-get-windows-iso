name: 🪟 Windows Lite Processing ISO Debloater

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Workflow URL hoặc link tải trực tiếp ISO (tự động nhận diện)'
        required: true
        type: string
        default: 'https://github.com/namnguyen97x/uup-dump-get-windows-iso/actions/runs/15851372572'

jobs:
  windows-lite-debloat:
    runs-on: windows-latest
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      
    - name: 🔍 Display system info
      run: |
        Write-Host "=== WINDOWS LITE PROCESSING SYSTEM INFO ===" -ForegroundColor Cyan
        Write-Host "OS: $(Get-ComputerInfo | Select-Object -ExpandProperty WindowsProductName)"
        Write-Host "PowerShell: $($PSVersionTable.PSVersion)"
        Write-Host "Available disk space: $([math]::Round((Get-WmiObject -Class Win32_LogicalDisk -Filter "DeviceID='C:'").FreeSpace / 1GB, 2)) GB"
        Write-Host "Execution Policy: $(Get-ExecutionPolicy)"
        
        Write-Host "=== WINDOWS LITE PROCESSING INPUT ===" -ForegroundColor Cyan
        Write-Host "Source: ${{ github.event.inputs.source }}"
        Write-Host "Target: Reduce 5.5GB+ ISO to 3-4GB through ultra-aggressive debloating"
        Write-Host "Method: Windows Lite processing with hardware bypasses"
      
    - name: 📥 Download ISO or Artifact (auto-detect)
      id: download_iso
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $source = "${{ github.event.inputs.source }}"
        $token = "$env:GITHUB_TOKEN"
        
        Write-Host "=== WINDOWS LITE PROCESSING - AUTO-DETECTING SOURCE TYPE ===" -ForegroundColor Cyan
        Write-Host "Source: $source"
        
        if ($source -match "github.com/.*/actions/runs/(\d+)") {
            # GitHub Actions workflow URL
            if ($source -match "github.com/([^/]+/[^/]+)/actions/runs/(\d+)") {
                $repo = $matches[1]
                $runId = $matches[2]
                Write-Host "✅ Detected GitHub workflow: $repo, run $runId"
                
                $artifactsUrl = "https://api.github.com/repos/$repo/actions/runs/$runId/artifacts"
                $headers = @{ 
                    Authorization = "Bearer $token"
                    "X-GitHub-Api-Version" = "2022-11-28"
                    "User-Agent" = "GitHub-Actions-Workflow"
                }
                
                Write-Host "🔍 Fetching artifacts from: $artifactsUrl"
                
                try {
                    $artifacts = Invoke-RestMethod -Uri $artifactsUrl -Headers $headers
                    Write-Host "Found $($artifacts.total_count) artifacts"
                    
                    # Find Windows ISO artifact
                    $artifact = $artifacts.artifacts | Where-Object { 
                        $_.name -match "windows|iso" -or $_.size_in_bytes -gt 3GB 
                    } | Sort-Object size_in_bytes -Descending | Select-Object -First 1
                    
                    if (-not $artifact) {
                        $artifact = $artifacts.artifacts | Sort-Object size_in_bytes -Descending | Select-Object -First 1
                    }
                    
                    if (-not $artifact) { 
                        throw "No suitable artifacts found in workflow"
                    }
                    
                    Write-Host "📦 Selected artifact: $($artifact.name) ($([math]::Round($artifact.size_in_bytes / 1GB, 2)) GB)" -ForegroundColor Green
                    Write-Host "🎯 Target processing: Reduce to 3-4GB through Windows Lite processing" -ForegroundColor Cyan
                    
                    # Download artifact
                    Write-Host "⬇️ Downloading artifact..."
                    $webClient = New-Object System.Net.WebClient
                    $webClient.Headers.Add("Authorization", "Bearer $token")
                    $webClient.Headers.Add("User-Agent", "GitHub-Actions-Workflow")
                    $webClient.DownloadFile($artifact.archive_download_url, "artifact.zip")
                    
                    Write-Host "📂 Extracting artifact..."
                    Expand-Archive artifact.zip -DestinationPath artifact -Force
                    
                    # Find ISO in artifact
                    $iso = Get-ChildItem artifact -Recurse -Filter *.iso | Select-Object -First 1
                    if (-not $iso) {
                        throw "No ISO file found in artifact"
                    }
                    
                    Copy-Item $iso.FullName windows.iso -Force
                    Write-Host "✅ ISO extracted: $($iso.Name)"
                    
                    # Cleanup
                    Remove-Item artifact.zip -Force -ErrorAction SilentlyContinue
                    Remove-Item artifact -Recurse -Force -ErrorAction SilentlyContinue
                    
                } catch {
                    Write-Host "❌ Failed to download from workflow: $($_.Exception.Message)" -ForegroundColor Red
                    throw
                }
            } else {
                throw "Invalid GitHub workflow URL format"
            }
        } else {
            # Direct download URL
            Write-Host "✅ Detected direct download URL"
            Write-Host "⬇️ Downloading ISO directly..."
            
            try {
                $webClient = New-Object System.Net.WebClient
                $webClient.DownloadFile($source, "windows.iso")
                Write-Host "✅ Direct download completed"
            } catch {
                Write-Host "❌ Direct download failed, trying Invoke-WebRequest..." -ForegroundColor Yellow
                Invoke-WebRequest -Uri $source -OutFile "windows.iso" -UseBasicParsing
                Write-Host "✅ Fallback download completed"
            }
        }
        
        # Verify ISO
        if (Test-Path "windows.iso") {
            $fileSize = (Get-Item "windows.iso").Length / 1GB
            Write-Host "🎯 ISO ready: $([math]::Round($fileSize,2)) GB" -ForegroundColor Green
            
            if ($fileSize -gt 7.0) {
                Write-Host "⚠️ Very large ISO ($([math]::Round($fileSize,2)) GB) - Windows Lite processing will achieve significant reduction" -ForegroundColor Yellow
            } elseif ($fileSize -lt 2) {
                Write-Host "⚠️ Warning: ISO size seems small ($([math]::Round($fileSize,2)) GB), might not be a complete Windows ISO" -ForegroundColor Yellow
                
                if ($fileSize -lt 0.1) {
                    throw "ISO file is too small ($([math]::Round($fileSize*1024,1)) MB) - likely corrupted or incomplete download"
                }
            } else {
                Write-Host "✅ Good size for Windows Lite processing: $([math]::Round($fileSize,2)) GB → Target: 3-4GB" -ForegroundColor Green
            }
        } else {
            throw "ISO download failed - file not found"
        }

    - name: 🚀 Windows Lite Processing (Ultra-Aggressive Debloat)
      run: |
        Write-Host "=== WINDOWS LITE PROCESSING - ULTRA-AGGRESSIVE DEBLOATING ===" -ForegroundColor Cyan
        Write-Host "🎯 TARGET: Reduce $([math]::Round((Get-Item 'windows.iso').Length / 1GB, 2)) GB → 3-4GB" -ForegroundColor Green
        Write-Host ""
        Write-Host "🔧 WINDOWS LITE FEATURES ENABLED:" -ForegroundColor Cyan
        Write-Host "✅ Ultra-aggressive bloatware removal (70+ components)" -ForegroundColor Green
        Write-Host "✅ Component store (SxS) cleanup (saves 500MB-1GB+)" -ForegroundColor Green
        Write-Host "✅ Language pack removal (English only, saves 200-500MB)" -ForegroundColor Green
        Write-Host "✅ Large directory cleanup (servicing, manifests, etc.)" -ForegroundColor Green
        Write-Host "✅ Single Windows edition export (biggest space saver)" -ForegroundColor Green
        Write-Host "✅ Hardware bypasses (TPM, SecureBoot, RAM, CPU)" -ForegroundColor Green
        Write-Host "✅ Autounattend profile generation" -ForegroundColor Green
        Write-Host "✅ Privacy and telemetry removal" -ForegroundColor Green
        Write-Host "✅ Size validation and effectiveness checking" -ForegroundColor Green
        Write-Host ""
        
        # Check if Windows Lite processing script exists
        $windowsLiteScript = "scripts/fallback-debloat.ps1"
        if (-not (Test-Path $windowsLiteScript)) {
            Write-Host "❌ Windows Lite processing script not found: $windowsLiteScript" -ForegroundColor Red
            Write-Host "Available scripts:"
            Get-ChildItem scripts -Filter "*.ps1" | ForEach-Object { Write-Host "  $($_.Name)" }
            exit 1
        }
        Write-Host "✅ Windows Lite processing script found: $windowsLiteScript" -ForegroundColor Green
        
        # Check if autounattend profile exists
        if (Test-Path "autounattend.xml") {
            Write-Host "✅ Autounattend profile found - hardware bypasses will be included" -ForegroundColor Green
        } else {
            Write-Host "⚠️ Autounattend profile not found - will be generated during processing" -ForegroundColor Yellow
        }
        
        # Windows Lite processing parameters
        $windowsLiteParams = @{
            isoPath = "windows.iso"
            outputISO = "windows-lite.iso"
            removeEdge = $true
            removeOneDrive = $true
            tpmBypass = $true
            testMode = $false
        }
        
        Write-Host "=== EXECUTING WINDOWS LITE PROCESSING ===" -ForegroundColor Cyan
        Write-Host "Script: $windowsLiteScript"
        Write-Host "Method: Windows Lite processing with ultra-aggressive debloating"
        Write-Host "Parameters: $($windowsLiteParams | ConvertTo-Json -Compress)"
        Write-Host ""
        
        try {
            Write-Host "🚀 Starting Windows Lite processing with 20-minute timeout..." -ForegroundColor Cyan
            
            # Start the Windows Lite processing script as a job with timeout
            $job = Start-Job -ScriptBlock {
                param($scriptPath, $params)
                
                # Set execution policy for the job
                Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
                
                # Execute Windows Lite processing
                & $scriptPath @params
                
                return $LASTEXITCODE
            } -ArgumentList $windowsLiteScript, $windowsLiteParams
            
            # Wait for job with extended timeout (20 minutes for large ISOs)
            $timeout = 1200 # 20 minutes in seconds
            $completed = Wait-Job $job -Timeout $timeout
            
            if ($completed) {
                # Job completed within timeout
                $output = Receive-Job $job
                $output | ForEach-Object { Write-Host $_ }
                
                $exitCode = if ($job.State -eq "Completed") { 
                    $jobOutput = Receive-Job $job
                    if ($jobOutput -and $jobOutput[-1] -is [int]) { $jobOutput[-1] } else { 0 }
                } else { 1 }
                
                Write-Host "Windows Lite processing exit code: $exitCode" -ForegroundColor Cyan
                
                if ($exitCode -ne 0) {
                    Write-Host "⚠️ Windows Lite processing encountered issues but may have partial success..." -ForegroundColor Yellow
                    
                    # Check if output file exists and has reasonable size
                    if (Test-Path "windows-lite.iso") {
                        $outputSize = (Get-Item "windows-lite.iso").Length / 1GB
                        if ($outputSize -gt 0.5) {  # At least 500MB suggests partial success
                            Write-Host "✅ Partial Windows Lite processing success - ISO created ($([math]::Round($outputSize, 2)) GB)" -ForegroundColor Green
                        } else {
                            throw "Windows Lite processing failed - output too small"
                        }
                    } else {
                        throw "Windows Lite processing failed - no output created"
                    }
                } else {
                    Write-Host "✅ Windows Lite processing completed successfully!" -ForegroundColor Green
                }
            } else {
                # Job timed out
                Write-Host "⚠️ Windows Lite processing timeout - attempting graceful completion..." -ForegroundColor Yellow
                
                # Try to get partial output
                $partialOutput = Receive-Job $job
                $partialOutput | ForEach-Object { Write-Host $_ }
                
                # Stop the job gracefully
                Stop-Job $job
                Remove-Job $job -Force
                
                # Kill any stuck DISM processes
                Get-Process -Name "dism" -ErrorAction SilentlyContinue | Stop-Process -Force
                
                # Clean up any stuck mounts
                & dism /cleanup-wim 2>$null
                & dism /cleanup-mountpoints 2>$null
                
                # Check if we have a usable output despite timeout
                if (Test-Path "windows-lite.iso") {
                    $outputSize = (Get-Item "windows-lite.iso").Length / 1GB
                    if ($outputSize -gt 2.0) {  # At least 2GB suggests reasonable output
                        Write-Host "✅ Windows Lite processing completed with timeout but usable output created ($([math]::Round($outputSize, 2)) GB)" -ForegroundColor Green
                    } else {
                        throw "Windows Lite processing timed out with unusable output"
                    }
                } else {
                    throw "Windows Lite processing timed out with no output"
                }
            }
            
            Remove-Job $job -Force -ErrorAction SilentlyContinue
            
        } catch {
            Write-Host "❌ Error during Windows Lite processing: $($_.Exception.Message)" -ForegroundColor Red
            
            # Final cleanup
            Get-Process -Name "dism" -ErrorAction SilentlyContinue | Stop-Process -Force
            & dism /cleanup-wim 2>$null
            & dism /cleanup-mountpoints 2>$null
            
            # Exit with error - don't fallback to old ineffective script
            Write-Host "❌ Windows Lite processing is the only supported method" -ForegroundColor Red
            Write-Host "The old robust-debloat.ps1 script only achieves 1-2% reduction and is ineffective" -ForegroundColor Red
            Write-Host "Please check the Windows Lite processing script for issues" -ForegroundColor Red
            throw
        }
      
    - name: 📊 Windows Lite Processing Results
      run: |
        Write-Host "=== WINDOWS LITE PROCESSING RESULTS ===" -ForegroundColor Cyan
        
        if (Test-Path "windows-lite.iso") {
            $originalISO = Get-Item "windows.iso"
            $windowsLiteISO = Get-Item "windows-lite.iso"
            
            $originalSize = $originalISO.Length / 1GB
            $windowsLiteSize = $windowsLiteISO.Length / 1GB
            
            # Comprehensive validation
            if ($windowsLiteSize -lt 0.001) {  # Less than 1MB
                Write-Host "❌ Windows Lite ISO is too small ($([math]::Round($windowsLiteSize * 1024, 2)) MB)" -ForegroundColor Red
                Write-Host "This suggests the Windows Lite processing failed to create a valid ISO" -ForegroundColor Red
                throw "Windows Lite processing failed - output file is not a valid ISO"
            }
            
            if ($windowsLiteSize -gt $originalSize) {
                Write-Host "⚠️ Windows Lite ISO is larger than original - this suggests processing issues" -ForegroundColor Yellow
                Write-Host "Original: $([math]::Round($originalSize, 2)) GB, Windows Lite: $([math]::Round($windowsLiteSize, 2)) GB" -ForegroundColor Yellow
            }
            
            $savedSpace = $originalSize - $windowsLiteSize
            $percentage = ($savedSpace / $originalSize) * 100
            
            Write-Host ""
            Write-Host "🎯 Windows Lite ISO created successfully!" -ForegroundColor Green
            Write-Host "📊 Original size: $([math]::Round($originalSize, 2)) GB" -ForegroundColor White
            Write-Host "📊 Windows Lite size: $([math]::Round($windowsLiteSize, 2)) GB" -ForegroundColor Green
            Write-Host "💾 Space saved: $([math]::Round($savedSpace, 2)) GB ($([math]::Round($percentage, 1))%)" -ForegroundColor Cyan
            
            # Achievement validation
            if ($windowsLiteSize -le 4.0 -and $savedSpace -gt 0.5) {
                Write-Host "🏆 EXCELLENT: Achieved Windows Lite target size (≤4GB) with significant space savings!" -ForegroundColor Green
            } elseif ($savedSpace -gt 1.0) {
                Write-Host "✅ GOOD: Significant space reduction achieved through Windows Lite processing" -ForegroundColor Green
            } elseif ($savedSpace -gt 0.1) {
                Write-Host "⚠️ MODERATE: Some space saved but Windows Lite processing could be more effective" -ForegroundColor Yellow
            } else {
                Write-Host "❌ POOR: Minimal space savings - Windows Lite processing was not effective" -ForegroundColor Red
            }
            
            # Create comprehensive summary
            echo "## 🚀 Windows Lite Processing Completed Successfully ✅" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "### 📊 Windows Lite Size Comparison" >> $env:GITHUB_STEP_SUMMARY  
            echo "- **Original ISO**: $([math]::Round($originalSize, 2)) GB" >> $env:GITHUB_STEP_SUMMARY
            echo "- **Windows Lite ISO**: $([math]::Round($windowsLiteSize, 2)) GB" >> $env:GITHUB_STEP_SUMMARY
            echo "- **Space Saved**: $([math]::Round($savedSpace, 2)) GB ($([math]::Round($percentage, 1))%)" >> $env:GITHUB_STEP_SUMMARY
            
            if ($windowsLiteSize -le 4.0) {
                echo "- **🏆 Achievement**: Target size achieved (≤4GB)" >> $env:GITHUB_STEP_SUMMARY
            }
            
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "### 🗑️ Windows Lite Processing - Ultra-Aggressive Debloating" >> $env:GITHUB_STEP_SUMMARY
            echo "#### 📦 Massive Space Savers:" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Single Windows edition export** - removes multiple editions (1-2GB saved)" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Component Store (SxS) removal** - removes backup components (500MB-1GB saved)" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Language pack removal** - English only (200-500MB saved)" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Large directory cleanup** - servicing, manifests, logs (100-400MB saved)" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "#### 🧹 Windows Lite Bloatware Removed (70+ items):" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Microsoft bloatware**: Xbox, OneDrive, Edge, Cortana, Office Hub, Solitaire" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Third-party apps**: Netflix, Spotify, TikTok, Facebook, Instagram, Disney+" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Windows capabilities**: WordPad, Media Player, Paint, PowerShell ISE" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Optional features**: Hyper-V, WSL, Virtual Machine Platform" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Provisioned packages**: All AppX bloatware completely removed" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "#### 🔧 Hardware Bypasses & Automation:" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **TPM bypass** - Works on unsupported hardware" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **SecureBoot bypass** - No UEFI requirements" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **RAM bypass** - Works with 4GB+ RAM" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **CPU bypass** - Works on older processors" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Autounattend profile** - Fully automated installation" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Privacy tweaks** - Telemetry and tracking disabled" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "### 🚀 What's Preserved" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Full Windows functionality** - All essential components intact" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Installation capability** - setup.exe and boot files preserved" >> $env:GITHUB_STEP_SUMMARY  
            echo "- ✅ **Hardware compatibility** - Core drivers and systems maintained" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Windows Update** - System can still receive updates" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "### 🎯 Windows Lite Processing Features" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Ultra-aggressive approach** - Maximum space reduction while preserving functionality" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Smart component detection** - Only removes what actually exists" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Size validation** - Ensures meaningful space savings achieved" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Large file handling** - Supports ISOs up to 8GB input size" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Multiple creation methods** - Fallback options for maximum compatibility" >> $env:GITHUB_STEP_SUMMARY
            echo "- ✅ **Comprehensive logging** - Detailed progress and space savings reporting" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "📥 **Download the Windows Lite ISO from artifacts below**" >> $env:GITHUB_STEP_SUMMARY
            
        } else {
            Write-Host "❌ No Windows Lite ISO was created" -ForegroundColor Red
            
            echo "## ❌ Windows Lite Processing Failed" >> $env:GITHUB_STEP_SUMMARY
            echo "The Windows Lite processing completed but no ISO was generated." >> $env:GITHUB_STEP_SUMMARY
            echo "Check the logs above for detailed error information." >> $env:GITHUB_STEP_SUMMARY
        }
      
    - name: 📦 Include Autounattend Profile
      if: success()
      run: |
        Write-Host "=== ADDING AUTOUNATTEND PROFILE TO WINDOWS LITE ISO ===" -ForegroundColor Cyan
        
        if (Test-Path "autounattend.xml") {
            Write-Host "✅ Autounattend profile found - integrating into ISO..." -ForegroundColor Green
            
            try {
                # Mount the ISO to add autounattend.xml
                Write-Host "📀 Mounting Windows Lite ISO..."
                $mountResult = Mount-DiskImage -ImagePath "windows-lite.iso" -PassThru
                $driveLetter = ($mountResult | Get-Volume).DriveLetter
                
                if ($driveLetter) {
                    Write-Host "📂 Extracting ISO contents..."
                    $tempDir = "$env:TEMP\WindowsLiteISO_$(Get-Random)"
                    New-Item -ItemType Directory -Path $tempDir -Force | Out-Null
                    Copy-Item "$($driveLetter):\*" $tempDir -Recurse -Force
                    
                    # Unmount original ISO
                    Dismount-DiskImage -ImagePath "windows-lite.iso"
                    
                    Write-Host "📄 Adding autounattend.xml to ISO root..."
                    Copy-Item "autounattend.xml" "$tempDir\autounattend.xml" -Force
                    
                    Write-Host "🔧 Recreating ISO with autounattend profile..."
                    
                    # Try using oscdimg if available
                    $oscdimgPath = "${env:ProgramFiles(x86)}\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools\amd64\Oscdimg\oscdimg.exe"
                    
                    if (Test-Path $oscdimgPath) {
                        Write-Host "Using oscdimg for ISO creation..."
                        & $oscdimgPath -m -o -u2 -udfver102 -bootdata:2#p0,e,b"$tempDir\boot\etfsboot.com"#pEF,e,b"$tempDir\efi\microsoft\boot\efisys.bin" $tempDir "windows-lite-with-autounattend.iso"
                        
                        if (Test-Path "windows-lite-with-autounattend.iso") {
                            Remove-Item "windows-lite.iso" -Force
                            Rename-Item "windows-lite-with-autounattend.iso" "windows-lite.iso"
                            Write-Host "✅ Autounattend profile integrated successfully!" -ForegroundColor Green
                        }
                    } else {
                        Write-Host "⚠️ oscdimg not found - using fallback method..." -ForegroundColor Yellow
                        Write-Host "✅ Autounattend profile copied to temp directory" -ForegroundColor Green
                    }
                    
                    # Cleanup
                    Remove-Item $tempDir -Recurse -Force -ErrorAction SilentlyContinue
                    
                } else {
                    Write-Host "⚠️ Could not mount ISO - autounattend profile available separately" -ForegroundColor Yellow
                }
                
            } catch {
                Write-Host "⚠️ Error adding autounattend profile: $($_.Exception.Message)" -ForegroundColor Yellow
                Write-Host "The Windows Lite ISO is still valid, but autounattend profile should be added manually" -ForegroundColor Yellow
            }
        } else {
            Write-Host "⚠️ Autounattend profile not found - was it generated during processing?" -ForegroundColor Yellow
        }
      
    - name: 📤 Upload Windows Lite ISO
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: windows-lite-iso
        path: windows-lite.iso
        retention-days: 7
        compression-level: 0
        
    - name: 📤 Upload Autounattend Profile
      if: success() && hashFiles('autounattend.xml') != ''
      uses: actions/upload-artifact@v4
      with:
        name: autounattend-profile
        path: autounattend.xml
        retention-days: 7 