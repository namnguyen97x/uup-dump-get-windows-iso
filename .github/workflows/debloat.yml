name: Debloat Windows ISO

on:
  workflow_dispatch:
    inputs:
      workflow_url:
        description: 'Workflow run URL (ví dụ: https://github.com/namnguyen97x/uup-dump-get-windows-iso/actions/runs/15851372572)'
        required: true
        type: string

jobs:
  detect-artifacts:
    runs-on: windows-2022
    outputs:
      workflow_run_id: ${{ steps.parse-url.outputs.run_id }}
      workflow_url_artifact: ${{ steps.get-artifact-from-url.outputs.artifact_name }}
      workflow_url_artifact_id: ${{ steps.get-artifact-from-url.outputs.artifact_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse workflow run ID from URL
        id: parse-url
        shell: pwsh
        run: |
          $workflowUrl = "${{ github.event.inputs.workflow_url }}"
          if ($workflowUrl -and $workflowUrl -ne '') {
            if ($workflowUrl -match '/runs/([0-9]+)') {
              $runId = $Matches[1]
              echo "run_id=$runId" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              Write-Host "Parsed workflow run ID: $runId"
            } else {
              Write-Host "No run ID found in URL."
              echo "run_id=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            }
          } else {
            echo "run_id=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Get artifact from workflow_url
        id: get-artifact-from-url
        if: steps.parse-url.outputs.run_id != ''
        shell: pwsh
        run: |
          $token = "${{ secrets.GITHUB_TOKEN }}"
          $repo = "${{ github.repository }}"
          $runId = "${{ steps.parse-url.outputs.run_id }}"
          $headers = @{
            'Authorization' = "token $token"
            'Accept' = 'application/vnd.github.v3+json'
          }
          $artifactsUrl = "https://api.github.com/repos/$repo/actions/runs/$runId/artifacts"
          $artifacts = Invoke-RestMethod -Uri $artifactsUrl -Headers $headers
          if ($artifacts.artifacts.Count -eq 1) {
            $artifactName = $artifacts.artifacts[0].name
            $artifactId = $artifacts.artifacts[0].id
            echo "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            echo "artifact_id=$artifactId" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Found artifact: $artifactName (id: $artifactId)"
          } elseif ($artifacts.artifacts.Count -gt 1) {
            $artifactName = $artifacts.artifacts[0].name
            $artifactId = $artifacts.artifacts[0].id
            echo "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            echo "artifact_id=$artifactId" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Multiple artifacts found, using: $artifactName (id: $artifactId)"
          } else {
            echo "artifact_name=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            echo "artifact_id=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "No artifact found in workflow run."
          }

  debloat-iso:
    needs: detect-artifacts
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PowerShell environment
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          Install-Module -Name 7Zip4PowerShell -Force -Scope CurrentUser -ErrorAction SilentlyContinue

      - name: Download and extract artifact from workflow_url (no gh CLI)
        if: needs.detect-artifacts.outputs.workflow_run_id != ''
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $token = "${{ secrets.GITHUB_TOKEN }}"
          $repo = "${{ github.repository }}"
          $artifactId = "${{ needs.detect-artifacts.outputs.workflow_url_artifact_id }}"
          $artifactName = "${{ needs.detect-artifacts.outputs.workflow_url_artifact }}"
          if (-not $artifactId -or -not $artifactName) {
            Write-Error "No artifact found for workflow run."
            exit 1
          }
          $headers = @{ 'Authorization' = "token $token"; 'Accept' = 'application/vnd.github.v3+json' }
          $downloadUrl = "https://api.github.com/repos/$repo/actions/artifacts/$artifactId/zip"
          $outputDir = "./iso-input"
          $zipPath = "$outputDir/$artifactName.zip"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
          Write-Host "Downloading artifact zip: $artifactName ($artifactId)"
          Invoke-RestMethod -Uri $downloadUrl -Headers $headers -OutFile $zipPath
          Write-Host "Extracting artifact zip..."
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::ExtractToDirectory($zipPath, $outputDir)
          Remove-Item $zipPath
          Write-Host "Artifact extracted to $outputDir"

      - name: List downloaded files
        shell: pwsh
        run: |
          Write-Host "Contents of iso-input directory:"
          Get-ChildItem -Path "./iso-input" -Recurse | Format-Table Name, Length, LastWriteTime

      - name: Run Simple Windows ISO Debloat script
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "./iso-output" -Force
          $ErrorActionPreference = "Continue"
          $ProgressPreference = "SilentlyContinue"
          Write-Host "Starting simple Windows ISO debloat process..."
          & "./scripts/simple-debloat.ps1" -InputPath "./iso-input" -OutputPath "./iso-output" -Verbose
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Debloat script failed with exit code: $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Show disk space after debloat
        shell: pwsh
        run: |
          Write-Host "Available disk space after debloat:"
          Get-PSDrive -PSProvider FileSystem

      - name: List debloated files
        shell: pwsh
        run: |
          Write-Host "Contents of iso-output directory:"
          Get-ChildItem -Path "./iso-output" -Recurse | Format-Table Name, Length, LastWriteTime

      - name: Upload debloated ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: debloated-windows-iso
          path: |
            ./iso-output/*.iso
            ./iso-output/*.json
            ./iso-output/*.xml
            ./iso-output/*.reg
            ./iso-output/*.ps1
            ./iso-output/*.md
            ./iso-output/*.txt
          retention-days: 30

      - name: Create debloat summary
        shell: pwsh
        run: |
          $inputFiles = Get-ChildItem -Path "./iso-input" -File
          $outputFiles = Get-ChildItem -Path "./iso-output" -File
          $inputSize = ($inputFiles | Measure-Object -Property Length -Sum).Sum
          $outputSize = ($outputFiles | Measure-Object -Property Length -Sum).Sum
          $sizeReduction = if ($inputSize -gt 0) { [math]::Round((($inputSize - $outputSize) / $inputSize) * 100, 2) } else { 0 }
          # Tạo summary dạng text thuần, không dùng markdown code block hoặc backtick
          $summary = "Windows ISO Debloat Summary`n`n"
          $summary += "Input Files:`n"
          foreach ($f in $inputFiles) { $summary += "- $($f.Name) ($([math]::Round($f.Length / 1MB, 2)) MB)`n" }
          $summary += "`nOutput Files:`n"
          foreach ($f in $outputFiles) { $summary += "- $($f.Name) ($([math]::Round($f.Length / 1MB, 2)) MB)`n" }
          $summary += "`nSize Reduction:`n"
          $summary += "- Original Size: $([math]::Round($inputSize / 1MB, 2)) MB`n"
          $summary += "- Debloated Size: $([math]::Round($outputSize / 1MB, 2)) MB`n"
          $summary += "- Reduction: $sizeReduction%`n"
          $summary += "`nDebloat Features Applied:`n"
          $summary += "- Created unattended setup configuration (unattend.xml)`n"
          $summary += "- Generated registry settings for telemetry removal`n"
          $summary += "- Created setup script for post-installation debloat`n"
          $summary += "- Applied OOBE bypass settings`n"
          $summary += "- Optimized for privacy and performance`n"
          $summary += "- Removed bloatware apps (via setup script)`n"
          $summary += "`nUsage Instructions:`n"
          $summary += "1. Burn ISO to USB/DVD: Use the debloated ISO file`n"
          $summary += "2. Automatic Setup: Installation will proceed without user interaction`n"
          $summary += "3. Post-Install: Run setup-debloat.ps1 for additional optimizations`n"
          $summary += "4. Registry Settings: Import debloat-settings.reg for telemetry removal`n"
          $summary += "`nFiles Included:`n"
          $summary += "- debloated-*.iso: Optimized Windows ISO`n"
          $summary += "- unattend.xml: Unattended setup configuration`n"
          $summary += "- debloat-settings.reg: Registry optimizations`n"
          $summary += "- setup-debloat.ps1: Post-installation script`n"
          $summary += "- README.md: Detailed instructions`n"
          $summary += "- *.json: Debloat information`n"
          Add-Content $env:GITHUB_STEP_SUMMARY $summary 