name: Debloat Windows ISO

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Workflow URL hoặc link tải trực tiếp ISO (tự động nhận diện)'
        required: true
        type: string
      test_mode:
        description: 'Chạy ở chế độ test (chỉ kiểm tra WIM, không debloat)'
        required: false
        type: boolean
        default: false

jobs:
  debloat:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download ISO or Artifact (auto-detect)
        id: download_iso
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $source = "${{ github.event.inputs.source }}"
          $token = "$env:GITHUB_TOKEN"
          
          Write-Host "=== DEBUG: Download Parameters ==="
          Write-Host "Source: $source"
          Write-Host "Token available: $($token.Length -gt 0)"
          
          if ($source -match "github.com/.*/actions/runs/(\d+)") {
              if ($source -match "github.com/([^/]+/[^/]+)/actions/runs/(\d+)") {
                  $repo = $matches[1]
                  $runId = $matches[2]
                  Write-Host "Detected workflow run: $repo, $runId"
                  $artifactsUrl = "https://api.github.com/repos/$repo/actions/runs/$runId/artifacts"
                  $headers = @{ Authorization = "Bearer $token"; "X-GitHub-Api-Version" = "2022-11-28" }
                  
                  Write-Host "Fetching artifacts from: $artifactsUrl"
                  $artifacts = Invoke-RestMethod -Uri $artifactsUrl -Headers $headers
                  
                  Write-Host "=== Available Artifacts ==="
                  if ($artifacts.artifacts.Count -eq 0) {
                      Write-Host "No artifacts found in this workflow run"
                  } else {
                      $artifacts.artifacts | ForEach-Object { 
                          Write-Host "  - $($_.name) (Size: $($_.size_in_bytes) bytes)"
                      }
                  }
                  
                  # Try to find ISO artifact - first look for exact "iso" match, then any artifact
                  $artifact = $artifacts.artifacts | Where-Object { $_.name -match "iso" } | Select-Object -First 1
                  if (-not $artifact) {
                      Write-Host "No artifact with 'iso' in name found, trying first available artifact..."
                      $artifact = $artifacts.artifacts | Select-Object -First 1
                  }
                  
                  if (-not $artifact) { 
                      Write-Error "No artifacts found in workflow run $runId"
                      Write-Host "Please ensure the source workflow has uploaded artifacts"
                      exit 1 
                  }
                  
                  $downloadUrl = $artifact.archive_download_url
                  Write-Host "Downloading artifact: $($artifact.name)"
                  Write-Host "Download URL: $downloadUrl"
                  
                  # Download with progress
                  $webClient = New-Object System.Net.WebClient
                  $webClient.Headers.Add("Authorization", "Bearer $token")
                  $webClient.Headers.Add("User-Agent", "GitHub-Actions-Workflow")
                  
                  try {
                      $webClient.DownloadFile($downloadUrl, "artifact.zip")
                      Write-Host "Download completed successfully"
                  } catch {
                      Write-Host "WebClient download failed, trying Invoke-WebRequest..."
                      Invoke-WebRequest -Uri $downloadUrl -Headers $headers -OutFile artifact.zip
                  }
                  
                  Write-Host "Extracting artifact..."
                  Expand-Archive artifact.zip -DestinationPath artifact -Force
                  
                  Write-Host "=== Danh sách file trong artifact sau khi giải nén ==="
                  Get-ChildItem artifact -Recurse | ForEach-Object { Write-Host $_.FullName }
                  
                  $iso = Get-ChildItem artifact -Recurse -Filter *.iso | Select-Object -First 1
                  if (-not $iso) {
                      Write-Host "LỖI: Không tìm thấy file ISO trong artifact!" -ForegroundColor Red
                      Write-Host "Available files in artifact:"
                      Get-ChildItem artifact -Recurse | ForEach-Object { Write-Host "  $($_.Name)" }
                      exit 1
                  }
                  
                  Write-Host "Đã tìm thấy file ISO: $($iso.FullName)"
                  Copy-Item $iso.FullName windows.iso -Force
                  Write-Host "Đã copy file ISO về: windows.iso"
                  
                  # Set environment variable
                  echo "ISO_PATH=windows.iso" | Out-File -FilePath $env:GITHUB_ENV -Append
                  
                  # Clean up
                  Remove-Item artifact.zip -Force -ErrorAction SilentlyContinue
                  Remove-Item artifact -Recurse -Force -ErrorAction SilentlyContinue
                  
              } else {
                  Write-Error "Invalid workflow URL format"
                  exit 1
              }
          } else {
              Write-Host "Detected direct download link"
              Write-Host "Downloading ISO from: $source"
              
              try {
                  Invoke-WebRequest -Uri $source -OutFile "windows.iso" -UseBasicParsing
                  Write-Host "Đã tải file ISO từ direct link về: windows.iso"
                  echo "ISO_PATH=windows.iso" | Out-File -FilePath $env:GITHUB_ENV -Append
              } catch {
                  Write-Host "LỖI: Không thể tải file ISO từ link: $_" -ForegroundColor Red
                  exit 1
              }
          }
          
          # Verify ISO file
          if (Test-Path "windows.iso") {
              $fileSize = (Get-Item "windows.iso").Length / 1GB
              Write-Host "ISO file verified: windows.iso ($([math]::Round($fileSize,2)) GB)"
          } else {
              Write-Host "LỖI: ISO file not found after download!" -ForegroundColor Red
              exit 1
          }

      - name: Debloat ISO (PowerShell)
        shell: pwsh
        run: |
          Write-Host "=== BẮT ĐẦU DEBLOAT ==="
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "Files in current directory:"
          Get-ChildItem | ForEach-Object { Write-Host "  $($_.Name)" }
          
          $iso = "$env:ISO_PATH"
          $testMode = "${{ github.event.inputs.test_mode }}" -eq "true"
          
          if (-not $iso) {
              Write-Host "LỖI: ISO_PATH environment variable không được set!" -ForegroundColor Red
              exit 1
          }
          
          if (-not (Test-Path $iso)) {
              Write-Host "LỖI: Không tìm thấy file ISO: $iso" -ForegroundColor Red
              exit 1
          }
          
          # Check file size
          $fileSize = (Get-Item $iso).Length / 1GB
          Write-Host "File ISO size: $([math]::Round($fileSize,2)) GB"
          
          # Check available disk space
          $drive = (Get-Item $iso).PSDrive
          $freeSpace = $drive.Free / 1GB
          Write-Host "Available disk space on $($drive.Name): $([math]::Round($freeSpace,2)) GB"
          
          if ($freeSpace -lt 20) {
              Write-Host "CẢNH BÁO: Ít hơn 20GB trống, có thể gặp lỗi!" -ForegroundColor Yellow
          }
          
          $output = "debloated-windows.iso"
          Write-Host "Input ISO: $iso"
          Write-Host "Output ISO: $output"
          Write-Host "Test Mode: $testMode"
          
          # Check if running as Administrator
          $isAdmin = ([Security.Principal.WindowsPrincipal] [Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole] "Administrator")
          Write-Host "Running as Administrator: $isAdmin"
          
          # Check required tools
          Write-Host "=== Checking required tools ==="
          $tools = @("dism", "robocopy", "reg")
          foreach ($tool in $tools) {
              $result = Get-Command $tool -ErrorAction SilentlyContinue
              if ($result) {
                  Write-Host "✓ $tool is available"
              } else {
                  Write-Host "✗ $tool is NOT available" -ForegroundColor Red
              }
          }
          
          # Check for optional tools
          Write-Host "=== Checking optional tools ==="
          $optionalTools = @("oscdimg", "wimlib-imagex", "7z")
          foreach ($tool in $optionalTools) {
              $result = Get-Command $tool -ErrorAction SilentlyContinue
              if ($result) {
                  Write-Host "✓ $tool is available"
              } else {
                  Write-Host "✗ $tool is NOT available (will use alternative method)" -ForegroundColor Yellow
              }
          }
          
          # Test script syntax first
          Write-Host "=== TESTING SCRIPT SYNTAX ==="
          $scriptPath = ".\scripts\debloat-windows-iso.ps1"
          Write-Host "Script path: $scriptPath"
          Write-Host "Script exists: $(Test-Path $scriptPath)"
          
          if (-not (Test-Path $scriptPath)) {
              Write-Host "LỖI: Script không tồn tại tại: $scriptPath" -ForegroundColor Red
              Write-Host "Available files in scripts directory:"
              Get-ChildItem ".\scripts\" | ForEach-Object { Write-Host "  $($_.Name)" }
              exit 1
          }
          
          # Test with simple script first
          Write-Host "Testing PowerShell execution with test script..."
          $testResult = powershell.exe -ExecutionPolicy Bypass -File .\scripts\test-script.ps1 -isoPath $iso -outputISO $output $(if ($testMode) { '-testMode' } else { '' }) 2>&1
          $testExitCode = $LASTEXITCODE
          Write-Host "Test script result (exit code $testExitCode):"
          $testResult | ForEach-Object { Write-Host "  $_" }
          
          if ($testExitCode -ne 0) {
              Write-Host "Test script failed! Something is wrong with PowerShell execution" -ForegroundColor Red
              exit 1
          }
          
          # Run script with detailed error handling
          try {
              Write-Host "=== EXECUTING SCRIPT ==="
              
              if (-not (Test-Path $scriptPath)) {
                  Write-Host "LỖI: Script không tồn tại tại: $scriptPath" -ForegroundColor Red
                  Write-Host "Available files in scripts directory:"
                  Get-ChildItem ".\scripts\" | ForEach-Object { Write-Host "  $($_.Name)" }
                  exit 1
              }
              
              # Build script parameters
              $scriptArgs = @{
                  isoPath = $iso
                  outputISO = $output
              }
              if ($testMode) {
                  $scriptArgs.testMode = $true
                  Write-Host "Running in TEST MODE - will only validate WIM file"
              }
              
                        # Capture all output including errors
          Write-Host "=== EXECUTING SCRIPT ==="
                    Write-Host "Script parameters: isoPath='$iso', outputISO='$output', testMode=$testMode"
          Write-Host "Executing with verbose output..."
          Write-Host "Expected runtime: 10-30 minutes depending on ISO size"
          
          # Execute with full output capture and timeout
          $timeout = if ($testMode) { 300 } else { 3600 }  # 5 min for test, 60 min for full
          Write-Host "Setting timeout to $timeout seconds"
          
          $startTime = Get-Date
          Write-Host "Starting script execution at: $startTime"
          
          # Execute with verbose output and error capturing
          Write-Host "Command: powershell.exe -ExecutionPolicy Bypass -File '$scriptPath' -isoPath '$($scriptArgs.isoPath)' -outputISO '$($scriptArgs.outputISO)' $(if ($scriptArgs.testMode) { '-testMode' })"
          
          $result = powershell.exe -ExecutionPolicy Bypass -File $scriptPath -isoPath $scriptArgs.isoPath -outputISO $scriptArgs.outputISO $(if ($scriptArgs.testMode) { '-testMode' } else { '' }) 2>&1
          $exitCode = $LASTEXITCODE
          $endTime = Get-Date
          $duration = $endTime - $startTime
          
          Write-Host "Script execution completed with exit code: $exitCode"
          Write-Host "Execution time: $($duration.TotalMinutes.ToString('F2')) minutes"
          Write-Host "=== FULL SCRIPT OUTPUT ==="
          $result | ForEach-Object { Write-Host "$_" }
              
              if ($exitCode -ne 0) {
                  Write-Host "LỖI: Script PowerShell trả về exit code $exitCode" -ForegroundColor Red
                  
                  if ($testMode) {
                      Write-Host "Test mode failed - WIM file validation unsuccessful" -ForegroundColor Red
                      Write-Host "This indicates an issue with the ISO or WIM file structure" -ForegroundColor Red
                  } else {
                      Write-Host "Debloat process failed - check the logs above for specific errors" -ForegroundColor Red
                  }
                  
                  exit $exitCode
              }
              
              if ($testMode) {
                  Write-Host "TEST MODE SUCCESSFUL - WIM file is valid!" -ForegroundColor Green
                  Write-Host "The ISO file structure is correct and ready for debloating" -ForegroundColor Green
              } else {
                  Write-Host "Script PowerShell chạy thành công!" -ForegroundColor Green
              }
          } catch {
              Write-Host "LỖI: Không thể chạy script PowerShell: $_" -ForegroundColor Red
              Write-Host "Exception details: $($_.Exception.Message)" -ForegroundColor Red
              Write-Host "Stack trace: $($_.ScriptStackTrace)" -ForegroundColor Red
              exit 1
          }
          
          # Verify output (only if not in test mode)
          if (-not $testMode) {
              if (Test-Path $output) {
                  $outputSize = (Get-Item $output).Length / 1GB
                  Write-Host "=== VERIFICATION ==="
                  Write-Host "Output ISO created successfully: $output"
                  Write-Host "Output size: $([math]::Round($outputSize,2)) GB"
                  Write-Host "Debloat process completed successfully!"
                  
                  # Set environment variable for upload step
                  echo "ISO_CREATED=true" | Out-File -FilePath $env:GITHUB_ENV -Append
              } else {
                  Write-Host "=== DEBLOAT COMPLETED WITHOUT ISO ==="
                  Write-Host "Debloat process completed successfully!" -ForegroundColor Green
                  Write-Host "ISO file was not created, but debloat files are available" -ForegroundColor Yellow
                  
                  # Check if debloated directory exists
                  $debloatedDir = "C:\WIDTemp\winlite"
                  if (Test-Path $debloatedDir) {
                      Write-Host "Debloated files found at: $debloatedDir" -ForegroundColor Green
                      Write-Host "Directory size: $((Get-ChildItem $debloatedDir -Recurse | Measure-Object -Property Length -Sum).Sum / 1GB) GB" -ForegroundColor Green
                  }
                  
                  # Set environment variable for upload step
                  echo "ISO_CREATED=false" | Out-File -FilePath $env:GITHUB_ENV -Append
              }
          }

      - name: Upload debloated ISO
        if: ${{ github.event.inputs.test_mode != 'true' && env.ISO_CREATED == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: debloated-windows
          path: debloated-windows.iso
          retention-days: 5

      - name: Upload debloated files (if ISO creation failed)
        if: ${{ github.event.inputs.test_mode != 'true' && env.ISO_CREATED == 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: debloated-windows-files
          path: C:\WIDTemp\winlite\
          retention-days: 5

      - name: Summary
        run: |
          $testMode = "${{ github.event.inputs.test_mode }}" -eq "true"
          $isoCreated = "$env:ISO_CREATED" -eq "true"
          
          if ($testMode) {
              echo "## Windows ISO Test Summary" >> $env:GITHUB_STEP_SUMMARY
              echo "" >> $env:GITHUB_STEP_SUMMARY
              echo "**Test Result:** ✅ PASSED" >> $env:GITHUB_STEP_SUMMARY
              echo "" >> $env:GITHUB_STEP_SUMMARY
              echo "### What was tested:" >> $env:GITHUB_STEP_SUMMARY
              echo "- ISO file download and extraction" >> $env:GITHUB_STEP_SUMMARY
              echo "- WIM file validation" >> $env:GITHUB_STEP_SUMMARY
              echo "- Windows edition detection" >> $env:GITHUB_STEP_SUMMARY
              echo "" >> $env:GITHUB_STEP_SUMMARY
              echo "### Next Steps:" >> $env:GITHUB_STEP_SUMMARY
              echo "Run the workflow again with test_mode=false to perform full debloating" >> $env:GITHUB_STEP_SUMMARY
          } elseif ($isoCreated) {
              echo "## Windows ISO Debloat Summary" >> $env:GITHUB_STEP_SUMMARY
              echo "" >> $env:GITHUB_STEP_SUMMARY
              echo "**Status:** ✅ COMPLETED WITH ISO" >> $env:GITHUB_STEP_SUMMARY
              echo "**Output File:** debloated-windows.iso" >> $env:GITHUB_STEP_SUMMARY
              echo "" >> $env:GITHUB_STEP_SUMMARY
              echo "### What was removed:" >> $env:GITHUB_STEP_SUMMARY
              echo "- Microsoft Edge" >> $env:GITHUB_STEP_SUMMARY
              echo "- OneDrive" >> $env:GITHUB_STEP_SUMMARY
              echo "- Windows Store Apps (News, Weather, Alarms, etc.)" >> $env:GITHUB_STEP_SUMMARY
              echo "- Windows Capabilities (Handwriting, OCR, Speech, etc.)" >> $env:GITHUB_STEP_SUMMARY
              echo "- Windows Features (Internet Explorer, Media Player, etc.)" >> $env:GITHUB_STEP_SUMMARY
              echo "" >> $env:GITHUB_STEP_SUMMARY
              echo "### Registry tweaks applied:" >> $env:GITHUB_STEP_SUMMARY
              echo "- Bypass TPM check" >> $env:GITHUB_STEP_SUMMARY
              echo "- Bypass Secure Boot check" >> $env:GITHUB_STEP_SUMMARY
              echo "" >> $env:GITHUB_STEP_SUMMARY
              echo "### Usage:" >> $env:GITHUB_STEP_SUMMARY
              echo "1. Download the debloated ISO artifact" >> $env:GITHUB_STEP_SUMMARY
              echo "2. Burn to USB or DVD" >> $env:GITHUB_STEP_SUMMARY
              echo "3. Install Windows with reduced bloatware" >> $env:GITHUB_STEP_SUMMARY
          } else {
              echo "## Windows ISO Debloat Summary" >> $env:GITHUB_STEP_SUMMARY
              echo "" >> $env:GITHUB_STEP_SUMMARY
              echo "**Status:** ✅ DEBLOAT COMPLETED (ISO creation failed)" >> $env:GITHUB_STEP_SUMMARY
              echo "" >> $env:GITHUB_STEP_SUMMARY
              echo "### What was accomplished:" >> $env:GITHUB_STEP_SUMMARY
              echo "- Windows ISO was successfully debloated" >> $env:GITHUB_STEP_SUMMARY
              echo "- All bloatware and unwanted components were removed" >> $env:GITHUB_STEP_SUMMARY
              echo "- Registry tweaks were applied" >> $env:GITHUB_STEP_SUMMARY
              echo "- ISO creation tools were not available in the environment" >> $env:GITHUB_STEP_SUMMARY
              echo "" >> $env:GITHUB_STEP_SUMMARY
              echo "### What was removed:" >> $env:GITHUB_STEP_SUMMARY
              echo "- Microsoft Edge" >> $env:GITHUB_STEP_SUMMARY
              echo "- OneDrive" >> $env:GITHUB_STEP_SUMMARY
              echo "- Windows Store Apps (News, Weather, Alarms, etc.)" >> $env:GITHUB_STEP_SUMMARY
              echo "- Windows Capabilities (Handwriting, OCR, Speech, etc.)" >> $env:GITHUB_STEP_SUMMARY
              echo "- Windows Features (Internet Explorer, Media Player, etc.)" >> $env:GITHUB_STEP_SUMMARY
              echo "" >> $env:GITHUB_STEP_SUMMARY
              echo "### Alternative solutions:" >> $env:GITHUB_STEP_SUMMARY
              echo "1. Download the debloated files manually from the build logs" >> $env:GITHUB_STEP_SUMMARY
              echo "2. Use a local environment with oscdimg or other ISO creation tools" >> $env:GITHUB_STEP_SUMMARY
              echo "3. Create a VM directly from the debloated files" >> $env:GITHUB_STEP_SUMMARY
          } 