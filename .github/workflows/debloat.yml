name: Debloat Windows ISO

on:
  workflow_dispatch:
    inputs:
      iso_source:
        description: 'ISO source (artifact, url, or auto-detect)'
        required: true
        default: 'auto-detect'
        type: choice
        options:
          - auto-detect
          - artifact
          - url
      iso_url:
        description: 'ISO URL (if source is url)'
        required: false
        type: string
      artifact_name:
        description: 'Artifact name to download (if source is artifact)'
        required: false
        type: string
        default: 'Windows-11-23H2'
      workflow_run_id:
        description: 'Workflow run ID to get artifacts from (optional)'
        required: false
        type: string
      artifact_pattern:
        description: 'Pattern to match artifact names (e.g., "Windows-*")'
        required: false
        type: string
        default: 'Windows-*'
  schedule:
    # Chạy hàng tuần vào Chủ nhật lúc 2:00 AM UTC
    - cron: '0 2 * * 0'

jobs:
  detect-artifacts:
    runs-on: windows-2022
    outputs:
      available-artifacts: ${{ steps.list-artifacts.outputs.artifacts }}
      latest-artifact: ${{ steps.get-latest.outputs.artifact }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List available artifacts
        id: list-artifacts
        shell: pwsh
        run: |
          # Lấy danh sách artifacts từ workflow runs gần đây
          $token = "${{ secrets.GITHUB_TOKEN }}"
          $repo = "${{ github.repository }}"
          $headers = @{
            'Authorization' = "token $token"
            'Accept' = 'application/vnd.github.v3+json'
          }
          
          # Lấy workflow runs gần đây (tối đa 10 runs)
          $workflowRunsUrl = "https://api.github.com/repos/$repo/actions/runs?per_page=10&status=completed&conclusion=success"
          $workflowRuns = Invoke-RestMethod -Uri $workflowRunsUrl -Headers $headers
          
          $allArtifacts = @()
          
          foreach ($run in $workflowRuns.workflow_runs) {
            Write-Host "Checking workflow run: $($run.id) - $($run.name)"
            
            # Lấy artifacts từ mỗi workflow run
            $artifactsUrl = "https://api.github.com/repos/$repo/actions/runs/$($run.id)/artifacts"
            try {
              $artifacts = Invoke-RestMethod -Uri $artifactsUrl -Headers $headers
              
              foreach ($artifact in $artifacts.artifacts) {
                if ($artifact.name -like "${{ github.event.inputs.artifact_pattern || 'Windows-*' }}") {
                  $artifactInfo = @{
                    name = $artifact.name
                    workflow_run_id = $run.id
                    workflow_name = $run.name
                    created_at = $artifact.created_at
                    size = $artifact.size_in_bytes
                  }
                  $allArtifacts += $artifactInfo
                  Write-Host "Found artifact: $($artifact.name) from workflow: $($run.name)"
                }
              }
            }
            catch {
              Write-Host "Failed to get artifacts from run $($run.id): $($_.Exception.Message)"
            }
          }
          
          # Chuyển đổi thành JSON để output
          $artifactsJson = $allArtifacts | ConvertTo-Json -Depth 3
          echo "artifacts=$artifactsJson" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          
          Write-Host "Total artifacts found: $($allArtifacts.Count)"

      - name: Get latest artifact
        id: get-latest
        shell: pwsh
        run: |
          $artifactsJson = '${{ steps.list-artifacts.outputs.artifacts }}'
          if ($artifactsJson -and $artifactsJson -ne '[]') {
            $artifacts = $artifactsJson | ConvertFrom-Json
            
            # Sắp xếp theo thời gian tạo (mới nhất trước)
            $latestArtifact = $artifacts | Sort-Object created_at -Descending | Select-Object -First 1
            
            $latestJson = $latestArtifact | ConvertTo-Json -Depth 3
            echo "artifact=$latestJson" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            
            Write-Host "Latest artifact: $($latestArtifact.name) from workflow: $($latestArtifact.workflow_name)"
          } else {
            Write-Host "No artifacts found"
            echo "artifact=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

  debloat-iso:
    needs: detect-artifacts
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PowerShell environment
        shell: pwsh
        run: |
          # Cài đặt các module PowerShell cần thiết
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          Install-Module -Name 7Zip4PowerShell -Force -Scope CurrentUser -ErrorAction SilentlyContinue

      - name: Download ISO from auto-detected artifact
        if: github.event.inputs.iso_source == 'auto-detect' || github.event.inputs.iso_source == null
        shell: pwsh
        run: |
          $latestArtifactJson = '${{ needs.detect-artifacts.outputs.latest-artifact }}'
          
          if ($latestArtifactJson -and $latestArtifactJson -ne '') {
            $latestArtifact = $latestArtifactJson | ConvertFrom-Json
            $artifactName = $latestArtifact.name
            $workflowRunId = $latestArtifact.workflow_run_id
            
            Write-Host "Downloading latest artifact: $artifactName from workflow run: $workflowRunId"
            
            # Tạo thư mục input
            New-Item -ItemType Directory -Path "./iso-input" -Force
            
            # Download artifact sử dụng GitHub CLI hoặc API
            gh run download $workflowRunId --name $artifactName --dir ./iso-input
            
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Successfully downloaded artifact: $artifactName"
            } else {
              Write-Error "Failed to download artifact: $artifactName"
              exit 1
            }
          } else {
            Write-Error "No artifacts found for auto-detection"
            exit 1
          }

      - name: Download ISO from specific artifact
        if: github.event.inputs.iso_source == 'artifact'
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.inputs.artifact_name || 'Windows-11-23H2' }}
          path: ./iso-input

      - name: Download ISO from specific workflow run
        if: github.event.inputs.iso_source == 'artifact' && github.event.inputs.workflow_run_id != ''
        shell: pwsh
        run: |
          $artifactName = "${{ github.event.inputs.artifact_name || 'Windows-11-23H2' }}"
          $workflowRunId = "${{ github.event.inputs.workflow_run_id }}"
          
          Write-Host "Downloading artifact: $artifactName from workflow run: $workflowRunId"
          
          # Tạo thư mục input
          New-Item -ItemType Directory -Path "./iso-input" -Force
          
          # Download artifact từ workflow run cụ thể
          gh run download $workflowRunId --name $artifactName --dir ./iso-input
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to download artifact from workflow run: $workflowRunId"
            exit 1
          }

      - name: Download ISO from URL
        if: github.event.inputs.iso_source == 'url' && github.event.inputs.iso_url != ''
        shell: pwsh
        run: |
          $isoUrl = "${{ github.event.inputs.iso_url }}"
          $outputPath = "./iso-input"
          New-Item -ItemType Directory -Path $outputPath -Force
          
          Write-Host "Downloading ISO from: $isoUrl"
          $fileName = Split-Path $isoUrl -Leaf
          $outputFile = Join-Path $outputPath $fileName
          
          Invoke-WebRequest -Uri $isoUrl -OutFile $outputFile -UseBasicParsing
          Write-Host "Downloaded ISO to: $outputFile"

      - name: List available artifacts for reference
        shell: pwsh
        run: |
          $artifactsJson = '${{ needs.detect-artifacts.outputs.available-artifacts }}'
          if ($artifactsJson -and $artifactsJson -ne '[]') {
            $artifacts = $artifactsJson | ConvertFrom-Json
            
            Write-Host "Available artifacts for reference:"
            $artifacts | ForEach-Object {
              $sizeMB = [math]::Round($_.size / 1MB, 2)
              Write-Host "  - $($_.name) (${sizeMB}MB) from $($_.workflow_name) - Created: $($_.created_at)"
            }
          }

      - name: List downloaded files
        shell: pwsh
        run: |
          Write-Host "Contents of iso-input directory:"
          Get-ChildItem -Path "./iso-input" -Recurse | Format-Table Name, Length, LastWriteTime

      - name: Run Simple Windows ISO Debloat script
        shell: pwsh
        run: |
          # Tạo thư mục output
          New-Item -ItemType Directory -Path "./iso-output" -Force
          
          # Chạy script debloat đơn giản
          $ErrorActionPreference = "Continue"
          $ProgressPreference = "SilentlyContinue"
          
          Write-Host "Starting simple Windows ISO debloat process..."
          & "./scripts/simple-debloat.ps1" -InputPath "./iso-input" -OutputPath "./iso-output" -Verbose
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Debloat script failed with exit code: $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Show disk space after debloat
        shell: pwsh
        run: |
          Write-Host "Available disk space after debloat:"
          Get-PSDrive -PSProvider FileSystem

      - name: List debloated files
        shell: pwsh
        run: |
          Write-Host "Contents of iso-output directory:"
          Get-ChildItem -Path "./iso-output" -Recurse | Format-Table Name, Length, LastWriteTime

      - name: Upload debloated ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: debloated-windows-iso
          path: |
            ./iso-output/*.iso
            ./iso-output/*.json
            ./iso-output/*.xml
            ./iso-output/*.reg
            ./iso-output/*.ps1
            ./iso-output/*.md
            ./iso-output/*.txt
          retention-days: 30

      - name: Create debloat summary
        shell: pwsh
        run: |
          $inputFiles = Get-ChildItem -Path "./iso-input" -File
          $outputFiles = Get-ChildItem -Path "./iso-output" -File
          
          $inputSize = ($inputFiles | Measure-Object -Property Length -Sum).Sum
          $outputSize = ($outputFiles | Measure-Object -Property Length -Sum).Sum
          $sizeReduction = if ($inputSize -gt 0) { [math]::Round((($inputSize - $outputSize) / $inputSize) * 100, 2) } else { 0 }
          
          # Lấy thông tin về artifact gốc
          $sourceInfo = ""
          if ('${{ github.event.inputs.iso_source }}' -eq 'auto-detect' -or '${{ github.event.inputs.iso_source }}' -eq '') {
            $latestArtifactJson = '${{ needs.detect-artifacts.outputs.latest-artifact }}'
            if ($latestArtifactJson -and $latestArtifactJson -ne '') {
              $latestArtifact = $latestArtifactJson | ConvertFrom-Json
              $sourceInfo = "Auto-detected: $($latestArtifact.name) from $($latestArtifact.workflow_name)"
            }
          } elseif ('${{ github.event.inputs.iso_source }}' -eq 'artifact') {
            $sourceInfo = "Manual artifact: ${{ github.event.inputs.artifact_name || 'Windows-11-23H2' }}"
            if ('${{ github.event.inputs.workflow_run_id }}' -ne '') {
              $sourceInfo += " (Run ID: ${{ github.event.inputs.workflow_run_id }})"
            }
          } elseif ('${{ github.event.inputs.iso_source }}' -eq 'url') {
            $sourceInfo = "URL: ${{ github.event.inputs.iso_url }}"
          }
          
          Add-Content $env:GITHUB_STEP_SUMMARY @"
          ## Windows ISO Debloat Summary
          
          ### Source Information
          **Source:** $sourceInfo
          
          ### Input Files
          | File | Size |
          |------|------|
          $($inputFiles | ForEach-Object {"| $($_.Name) | $([math]::Round($_.Length / 1MB, 2)) MB |"})
          
          ### Output Files
          | File | Size |
          |------|------|
          $($outputFiles | ForEach-Object {"| $($_.Name) | $([math]::Round($_.Length / 1MB, 2)) MB |"})
          
          ### Size Reduction
          - **Original Size:** $([math]::Round($inputSize / 1MB, 2)) MB
          - **Debloated Size:** $([math]::Round($outputSize / 1MB, 2)) MB
          - **Reduction:** $sizeReduction%
          
          ### Debloat Features Applied
          - Created unattended setup configuration (unattend.xml)
          - Generated registry settings for telemetry removal
          - Created setup script for post-installation debloat
          - Applied OOBE bypass settings
          - Optimized for privacy and performance
          - Removed bloatware apps (via setup script)
          
          ### Usage Instructions
          1. **Burn ISO to USB/DVD**: Use the debloated ISO file
          2. **Automatic Setup**: Installation will proceed without user interaction
          3. **Post-Install**: Run setup-debloat.ps1 for additional optimizations
          4. **Registry Settings**: Import debloat-settings.reg for telemetry removal
          
          ### Files Included
          - `debloated-*.iso` - Optimized Windows ISO
          - `unattend.xml` - Unattended setup configuration
          - `debloat-settings.reg` - Registry optimizations
          - `setup-debloat.ps1` - Post-installation script
          - `README.md` - Detailed instructions
          - `*.json` - Debloat information
          "@ 