name: Debloat Windows ISO

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Workflow URL hoặc link tải trực tiếp ISO (tự động nhận diện)'
        required: true
        type: string
      test_mode:
        description: 'Chạy ở chế độ test (chỉ kiểm tra WIM, không debloat)'
        required: false
        type: boolean
        default: false

jobs:
  debloat:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download ISO or Artifact (auto-detect)
        id: download_iso
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $source = "${{ github.event.inputs.source }}"
          $token = "$env:GITHUB_TOKEN"
          
          Write-Host "Source: $source"
          
          if ($source -match "github.com/.*/actions/runs/(\d+)") {
              if ($source -match "github.com/([^/]+/[^/]+)/actions/runs/(\d+)") {
                  $repo = $matches[1]
                  $runId = $matches[2]
                  Write-Host "Downloading from workflow: $repo, run $runId"
                  
                  $artifactsUrl = "https://api.github.com/repos/$repo/actions/runs/$runId/artifacts"
                  $headers = @{ Authorization = "Bearer $token"; "X-GitHub-Api-Version" = "2022-11-28" }
                  
                  $artifacts = Invoke-RestMethod -Uri $artifactsUrl -Headers $headers
                  $artifact = $artifacts.artifacts | Where-Object { $_.name -match "iso" } | Select-Object -First 1
                  
                  if (-not $artifact) {
                      $artifact = $artifacts.artifacts | Select-Object -First 1
                  }
                  
                  if (-not $artifact) { 
                      Write-Error "No artifacts found"
                      exit 1 
                  }
                  
                  $webClient = New-Object System.Net.WebClient
                  $webClient.Headers.Add("Authorization", "Bearer $token")
                  $webClient.Headers.Add("User-Agent", "GitHub-Actions-Workflow")
                  $webClient.DownloadFile($artifact.archive_download_url, "artifact.zip")
                  
                  Expand-Archive artifact.zip -DestinationPath artifact -Force
                  
                  $iso = Get-ChildItem artifact -Recurse -Filter *.iso | Select-Object -First 1
                  if (-not $iso) {
                      Write-Host "No ISO found in artifact"
                      exit 1
                  }
                  
                  Copy-Item $iso.FullName windows.iso -Force
                  
                  # Clean up
                  Remove-Item artifact.zip -Force -ErrorAction SilentlyContinue
                  Remove-Item artifact -Recurse -Force -ErrorAction SilentlyContinue
                  
              } else {
                  Write-Error "Invalid workflow URL"
                  exit 1
              }
          } else {
              Write-Host "Direct download from: $source"
              Invoke-WebRequest -Uri $source -OutFile "windows.iso" -UseBasicParsing
          }
          
          # Verify
          if (Test-Path "windows.iso") {
              $fileSize = (Get-Item "windows.iso").Length / 1GB
              Write-Host "ISO downloaded: $([math]::Round($fileSize,2)) GB"
          } else {
              Write-Host "ISO download failed"
              exit 1
          }

      - name: Run Real Debloat
        shell: pwsh
        run: |
          Write-Host "=== STARTING REAL DEBLOAT ==="
          
          $testMode = "${{ github.event.inputs.test_mode }}" -eq "true"
          Write-Host "Test mode: $testMode"
          
          # Check files
          Write-Host "Files in current directory:"
          Get-ChildItem | ForEach-Object { Write-Host "  $($_.Name)" }
          
          # Run the real debloat script
          Write-Host "Executing REAL debloat script..."
          
          if ($testMode) {
              .\scripts\real-debloat.ps1 -isoPath "windows.iso" -outputISO "debloated-windows.iso" -testMode
          } else {
              .\scripts\real-debloat.ps1 -isoPath "windows.iso" -outputISO "debloated-windows.iso"
          }
          
          $exitCode = $LASTEXITCODE
          Write-Host "Script exit code: $exitCode"
          
          if ($exitCode -ne 0) {
              Write-Host "Script failed with exit code $exitCode"
              exit $exitCode
          }
          
          # Check output
          if (-not $testMode) {
              if (Test-Path "debloated-windows.iso") {
                  $outputSize = (Get-Item "debloated-windows.iso").Length / 1GB
                  Write-Host "Output created: $([math]::Round($outputSize,2)) GB"
                  echo "ISO_CREATED=true" >> $env:GITHUB_ENV
              } else {
                  Write-Host "No output file created"
                  echo "ISO_CREATED=false" >> $env:GITHUB_ENV
              }
          }

      - name: Upload Result
        if: ${{ github.event.inputs.test_mode != 'true' && env.ISO_CREATED == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: debloated-windows
          path: debloated-windows.iso
          retention-days: 5

      - name: Summary
        run: |
          $testMode = "${{ github.event.inputs.test_mode }}" -eq "true"
          $isoCreated = "$env:ISO_CREATED" -eq "true"
          
          if ($testMode) {
              echo "## Test Completed Successfully ✅" >> $env:GITHUB_STEP_SUMMARY
              echo "ISO structure validated and ready for debloating" >> $env:GITHUB_STEP_SUMMARY
          } elseif ($isoCreated) {
              echo "## Debloat Completed Successfully ✅" >> $env:GITHUB_STEP_SUMMARY
              echo "Download the debloated ISO from artifacts" >> $env:GITHUB_STEP_SUMMARY
          } else {
              echo "## Process Completed ⚠️" >> $env:GITHUB_STEP_SUMMARY
              echo "Script ran but no ISO was created" >> $env:GITHUB_STEP_SUMMARY
          } 