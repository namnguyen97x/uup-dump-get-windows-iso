name: build-debloat-v2
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 18 * *' # every month, the 18th day.

jobs:
  get-matrix:
    runs-on: windows-2022
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Get targets from PowerShell (Debloat V2)
        id: get-targets
        shell: pwsh
        working-directory: ./debloat-test
        run: |
          $targets = & ./list-targets-debloat.ps1 | Out-String
          $targets = $targets -replace '[\r\n]+',''
          echo "targets=$targets" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      - name: Set matrix
        id: set-matrix
        shell: pwsh
        run: |
          $matrix = @{ name = @(${env:TARGETS} | ConvertFrom-Json) } | ConvertTo-Json -Compress
          echo "matrix=$matrix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        env:
          TARGETS: ${{ steps.get-targets.outputs.targets }}

  build:
    needs: get-matrix
    runs-on: windows-2022
    strategy:
      matrix: ${{ fromJson(needs.get-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Show available disk space before build
        run: Get-PSDrive -PSProvider FileSystem
      - name: Build Ultra-Lite Debloated Windows (V2 Method)
        working-directory: ./debloat-test
        run: pwsh ./uup-dump-debloat-v2-final.ps1 ${{ matrix.name }} c:/output
      - name: Show available disk space after build
        run: Get-PSDrive -PSProvider FileSystem
      - name: Build summary (Ultra-Lite Debloated V2)
        run: |
          $isoJson = Get-ChildItem c:/output/*.json | Where-Object { $_.Name -like "*debloated*" } | Select-Object -First 1
          if ($isoJson) {
            $iso = Get-Content $isoJson.FullName | ConvertFrom-Json
            Add-Content $env:GITHUB_STEP_SUMMARY @"
          ## 🎯 Ultra-Lite Debloated Windows ISO (V2)
          
          | Property | Value |
          | :--- | :--- |
          | **Name** | $($iso.name) |
          | **Title** | $($iso.title) |
          | **Method** | $($iso.method) |
          | **Debloated** | ✅ $($iso.debloated) |
          | **Core Apps Only** | ✅ $($iso.coreAppsOnly) |
          | **Apps Removed** | 🗑️ $($iso.appsRemoved) |
          | **Apps Kept** | ✅ $($iso.appsKept) (Core only) |
          | **Created** | $($iso.createdDate) |
          
          ### 🚀 Result: Ultra-Lite Windows with only 3 core apps!
          - ✅ Calculator
          - ✅ Notepad  
          - ✅ Microsoft Store
          - ❌ All other bloatware removed via DISM
          "@
          } else {
            Add-Content $env:GITHUB_STEP_SUMMARY "❌ No debloated ISO metadata found"
          }
      - name: Upload artifact (Ultra-Lite Debloated V2)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-ultra-lite-v2
          path: |
            c:/output/*debloated*.json
            c:/output/*debloated*.iso
            c:/output/*.iso.sha256.txt 