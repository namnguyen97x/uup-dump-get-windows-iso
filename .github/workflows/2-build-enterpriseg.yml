name: 2. Build Enterprise G ISO

on:
  workflow_run:
    workflows: ["1. Extract WIM from ISO"]
    types: [completed]
    branches: [main]
  
  workflow_dispatch:
    inputs:
      wim_artifact:
        description: 'WIM Artifact Name'
        required: true
        type: string
      enable_activation:
        description: 'Enable KMS38 Activation'
        required: false
        default: true
        type: boolean
      remove_edge:
        description: 'Remove Microsoft Edge'
        required: false
        default: true
        type: boolean

env:
  ENABLE_ACTIVATION: ${{ github.event.inputs.enable_activation || 'true' }}
  REMOVE_EDGE: ${{ github.event.inputs.remove_edge || 'true' }}

jobs:
  build-enterpriseg:
    name: Process WIM to Enterprise G
    runs-on: windows-latest
    timeout-minutes: 240
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Download WIM Artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ github.event.inputs.wim_artifact || format('wim-build-22631-{0}', github.event.workflow_run.run_number) }}
        path: wim-source
    
    - name: Setup Build Environment
      shell: powershell
      run: |
        Write-Host "Setting up Enterprise G build environment..." -ForegroundColor Green
        
        # Check admin rights
        if (-not ([Security.Principal.WindowsPrincipal][Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)) {
          Write-Host "Running as Administrator: OK" -ForegroundColor Green
        }
        
        # Create required directories exactly as Enterprise G expects
        @("mount", "sxs", "output") | ForEach-Object {
          if (!(Test-Path $_ -PathType Container)) { 
            New-Item -Path $_ -ItemType Directory -Force | Out-Null 
            Write-Host "Created directory: $_" -ForegroundColor Cyan
          }
        }
        
        # Set execution policy
        Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
        
        # Check disk space
        $disk = Get-WmiObject -Class Win32_LogicalDisk -Filter "DeviceID='C:'"
        $freeGB = [math]::Round($disk.FreeSpace / 1GB, 2)
        Write-Host "Available disk space: $freeGB GB" -ForegroundColor Cyan
    
    - name: Load Build Info and WIM
      shell: powershell
      run: |
        Write-Host "Loading build information..." -ForegroundColor Green
        
        # Load build info
        $buildInfo = Get-Content "wim-source/build-info.json" | ConvertFrom-Json
        Write-Host "Target Build: $($buildInfo.TargetBuild)" -ForegroundColor Cyan
        Write-Host "Pro Index: $($buildInfo.ProIndex)" -ForegroundColor Cyan
        Write-Host "Build Date: $($buildInfo.BuildDate)" -ForegroundColor Cyan
        
        # Copy WIM to root directory with expected name
        $wimSource = "wim-source/install.wim"
        if (Test-Path $wimSource) {
          Copy-Item -Path $wimSource -Destination "install.wim" -Force
          Write-Host "WIM file ready for processing" -ForegroundColor Green
          
          # Store build info for later steps
          echo "TARGET_BUILD=$($buildInfo.TargetBuild)" >> $env:GITHUB_ENV
          echo "PRO_INDEX=$($buildInfo.ProIndex)" >> $env:GITHUB_ENV
        } else {
          throw "WIM file not found in artifact"
        }
    
    - name: Execute Enterprise G Build Script
      shell: powershell
      run: |
        Write-Host "Starting Enterprise G conversion..." -ForegroundColor Green
        
        # Navigate to Enterprise G directory
        Set-Location -Path "Enterprise G"
        
        # Check if required files exist
        if (-not (Test-Path "Build without Copilot.ps1")) {
          throw "Enterprise G build script not found"
        }
        
        if (-not (Test-Path "files/wimlib-imagex.exe")) {
          throw "wimlib-imagex.exe not found in Enterprise G files"
        }
        
        # Update config.ini based on inputs
        $configContent = @"
[Settings]
ActivateWindows = $env:ENABLE_ACTIVATION
RemoveEdge = $env:REMOVE_EDGE

"@
        Set-Content -Path "config.ini" -Value $configContent -Encoding ASCII
        Write-Host "Updated config.ini with workflow settings" -ForegroundColor Cyan
        
        # Copy WIM file to Enterprise G directory
        Copy-Item -Path "../install.wim" -Destination "." -Force
        
        try {
          # Execute the Enterprise G build script
          Write-Host "Executing Enterprise G build script..." -ForegroundColor Yellow
          & powershell -ExecutionPolicy Bypass -File "Build without Copilot.ps1"
          
          Write-Host "Enterprise G build script completed" -ForegroundColor Green
          
        } catch {
          Write-Host "Enterprise G build failed: $_" -ForegroundColor Red
          exit 1
        }
        
        # Move back to root
        Set-Location -Path ".."
    
    - name: Create Final ISO
      shell: powershell
      run: |
        Write-Host "Creating final Enterprise G ISO..." -ForegroundColor Green
        
        # Find the processed WIM file
        $processedWim = Get-ChildItem -Path "Enterprise G" -Filter "*.wim" | Where-Object { $_.Name -ne "install.wim" } | Select-Object -First 1
        
        if (-not $processedWim) {
          # If no new WIM, use the original (it should be modified in place)
          $processedWim = Get-ChildItem -Path "Enterprise G" -Filter "install.wim" | Select-Object -First 1
        }
        
        if ($processedWim) {
          Write-Host "Found processed WIM: $($processedWim.Name)" -ForegroundColor Green
          
          # Create output directory
          if (-not (Test-Path "output")) {
            New-Item -ItemType Directory -Path "output" -Force | Out-Null
          }
          
          # Generate final filename
          $timestamp = Get-Date -Format "yyyyMMdd"
          $finalName = "Windows11-EnterpriseG-$env:TARGET_BUILD-$timestamp"
          
          # Copy processed WIM to output
          Copy-Item -Path $processedWim.FullName -Destination "output/$finalName.wim" -Force
          
          # Compress WIM for easier download
          Write-Host "Compressing WIM file..." -ForegroundColor Cyan
          Compress-Archive -Path "output/$finalName.wim" -DestinationPath "output/$finalName.zip" -CompressionLevel Optimal
          
          # Calculate sizes
          $originalSize = [math]::Round($processedWim.Length / 1MB, 2)
          $compressedSize = [math]::Round((Get-Item "output/$finalName.zip").Length / 1MB, 2)
          $ratio = [math]::Round(($compressedSize / $originalSize) * 100, 1)
          
          Write-Host "Original WIM: $originalSize MB" -ForegroundColor Cyan
          Write-Host "Compressed: $compressedSize MB ($ratio%)" -ForegroundColor Cyan
          
          # Create build summary
          $summary = @{
            BuildDate = Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC"
            TargetBuild = $env:TARGET_BUILD
            Edition = "Enterprise G"
            ActivationEnabled = $env:ENABLE_ACTIVATION
            EdgeRemoved = $env:REMOVE_EDGE
            OriginalSizeMB = $originalSize
            CompressedSizeMB = $compressedSize
            CompressionRatio = "$ratio%"
            FileName = "$finalName.zip"
            WorkflowRun = "${{ github.run_number }}"
          }
          
          $summary | ConvertTo-Json | Set-Content "output/build-summary.json" -Encoding UTF8
          
          Write-Host "Build summary created" -ForegroundColor Green
          
        } else {
          throw "No processed WIM file found"
        }
    
    - name: Verify Enterprise G Conversion
      shell: powershell
      run: |
        Write-Host "Verifying Enterprise G conversion..." -ForegroundColor Green
        
        $wimFile = Get-ChildItem -Path "output" -Filter "*.wim" | Select-Object -First 1
        if ($wimFile) {
          try {
            $wimInfo = Get-WindowsImage -ImagePath $wimFile.FullName -Index 1
            Write-Host "Final Edition: $($wimInfo.ImageName)" -ForegroundColor Green
            Write-Host "Final Version: $($wimInfo.Version)" -ForegroundColor Green
            
            if ($wimInfo.ImageName -match "Enterprise.*G") {
              Write-Host "✅ Successfully converted to Enterprise G" -ForegroundColor Green
            } else {
              Write-Host "⚠️ Warning: Edition name doesn't contain 'Enterprise G'" -ForegroundColor Yellow
            }
            
          } catch {
            Write-Host "Could not verify WIM info: $_" -ForegroundColor Yellow
          }
        }
    
    - name: Upload Enterprise G Build
      uses: actions/upload-artifact@v4
      with:
        name: windows11-enterpriseg-${{ env.TARGET_BUILD }}-${{ github.run_number }}
        path: |
          output/*.zip
          output/*.json
        retention-days: 30
        compression-level: 6
    
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ env.TARGET_BUILD }}-${{ github.run_number }}
        name: Windows 11 Enterprise G Build ${{ env.TARGET_BUILD }}
        body: |
          ## 🚀 Windows 11 Enterprise G Build
          
          **Build Information:**
          - Target Build: ${{ env.TARGET_BUILD }}
          - Activation: ${{ env.ENABLE_ACTIVATION }}
          - Edge Removed: ${{ env.REMOVE_EDGE }}
          - Build Date: ${{ github.event.repository.updated_at }}
          
          **Features:**
          - ✅ Enterprise G Edition (Government Grade)
          - ✅ Privacy Optimized (Telemetry Disabled)
          - ✅ Consumer Features Removed
          - ✅ Registry Optimizations Applied
          
          **Installation:**
          1. Download the ZIP file
          2. Extract the WIM file
          3. Use DISM or other tools to create bootable media
          4. Install as normal Windows 11
          
          ⚠️ **Disclaimer:** For educational/testing purposes only.
        files: output/*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Cleanup
      if: always()
      shell: powershell
      run: |
        Write-Host "Performing cleanup..." -ForegroundColor Green
        
        # Clean up mounted images
        try {
          Get-WindowsImage -Mounted -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "Cleaning mounted image: $($_.Path)" -ForegroundColor Yellow
            Dismount-WindowsImage -Path $_.Path -Discard -ErrorAction SilentlyContinue
          }
        } catch {
          Write-Host "No mounted images to clean" -ForegroundColor Cyan
        }
        
        # Clean up temp directories
        @("mount", "sxs", "temp") | ForEach-Object {
          if (Test-Path $_) {
            Remove-Item -Path $_ -Recurse -Force -ErrorAction SilentlyContinue
            Write-Host "Removed directory: $_" -ForegroundColor Cyan
          }
        }
        
        # Run DISM cleanup
        try {
          dism /cleanup-wim
          Write-Host "DISM cleanup completed" -ForegroundColor Cyan
        } catch {
          Write-Host "DISM cleanup skipped" -ForegroundColor Yellow
        }
        
        Write-Host "Cleanup completed" -ForegroundColor Green 